<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#F0E9DA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CalTrack">
<title>CalTrack — Mindful eating, visualized</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* paper */
  --paper:        #F4EEDF;
  --paper-warm:   #F8F2E4;
  --paper-edge:   #E5DBC6;
  --card:         #FCF7E9;
  --card-hover:   #FFFAEC;

  /* ink */
  --ink:          #1A140C;
  --ink-soft:     #5C4F3A;
  --ink-whisper:  #9C8E72;
  --ink-ghost:    #C4B89C;

  /* hairline */
  --rule:         rgba(26, 20, 12, 0.10);
  --rule-soft:    rgba(26, 20, 12, 0.05);

  /* food palette */
  --terracotta:   #B14A2D;
  --terracotta-soft: rgba(177, 74, 45, 0.08);
  --sage:         #5C7547;
  --sage-soft:    rgba(92, 117, 71, 0.10);
  --saffron:      #C18935;
  --saffron-soft: rgba(193, 137, 53, 0.10);
  --rose:         #8C3F31;

  /* type */
  --serif:        'Newsreader', 'EB Garamond', Georgia, serif;
  --mono:         'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* rhythm */
  --gutter: 28px;
  --max-w:  720px;

  /* warm wash at top of page */
  --wash:         rgba(255, 226, 175, 0.18);
}

[data-theme="dark"] {
  /* midnight cookbook — deep umber paper, warm cream ink */
  --paper:        #161210;
  --paper-warm:   #1E1916;
  --paper-edge:   #0D0A09;
  --card:         #1E1916;
  --card-hover:   #2A231F;

  --ink:          #ECE0CB;
  --ink-soft:     #B5A48B;
  --ink-whisper:  #786A55;
  --ink-ghost:    #4A4234;

  --rule:         rgba(236, 224, 203, 0.12);
  --rule-soft:    rgba(236, 224, 203, 0.05);

  --terracotta:   #DA8463;
  --terracotta-soft: rgba(218, 132, 99, 0.12);
  --sage:         #A6BF80;
  --sage-soft:    rgba(166, 191, 128, 0.12);
  --saffron:      #E1B461;
  --saffron-soft: rgba(225, 180, 97, 0.12);
  --rose:         #CB8472;

  --wash:         rgba(218, 132, 99, 0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
}

body {
  font-family: var(--serif);
  font-feature-settings: "kern", "liga", "onum", "ss01";
  font-optical-sizing: auto;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px var(--gutter) 80px;
  padding-top: max(28px, env(safe-area-inset-top));
  padding-bottom: max(80px, env(safe-area-inset-bottom));
  position: relative;
  overflow-x: hidden;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.4s ease, color 0.4s ease;
}

/* warm light gradient at top — quiet support, not texture */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; height: 360px;
  background: radial-gradient(ellipse 80% 100% at 50% 0%, var(--wash), transparent 75%);
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.4s ease;
}

html { transition: background-color 0.4s ease; background: var(--paper); }

.page {
  max-width: var(--max-w);
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ───────────────────────────── Masthead ───────────────────────────── */

.masthead {
  text-align: center;
  margin: 24px 0 56px;
  animation: fadeInUp 0.7s cubic-bezier(.22,.65,.27,1) both;
}

.kicker {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-whisper);
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.kicker::before, .kicker::after {
  content: '';
  width: 30px; height: 1px;
  background: var(--ink-ghost);
}

.wordmark {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: clamp(56px, 11vw, 92px);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 72;
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.wordmark .accent {
  color: var(--terracotta);
  font-style: italic;
}

.dek {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  color: var(--ink-soft);
  margin-top: 14px;
  letter-spacing: 0.005em;
}

.refresh-btn {
  position: absolute;
  top: 32px;
  right: var(--gutter);
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 38px; height: 38px;
  cursor: pointer;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  z-index: 2;
}
.refresh-btn:hover {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}
.refresh-btn:active svg { animation: spin 0.6s ease; }

/* ──────────────────────────── Toolbar ──────────────────────────── */

.toolbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 44px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  animation: fadeInUp 0.7s 0.08s cubic-bezier(.22,.65,.27,1) both;
}

.people {
  font-family: var(--serif);
  font-size: 19px;
}
.people .label {
  font-style: italic;
  color: var(--ink-whisper);
  margin-right: 12px;
  font-size: 13px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: var(--mono);
  font-weight: 500;
}
.people button {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink-ghost);
  cursor: pointer;
  padding: 4px 4px;
  margin-right: 6px;
  border-bottom: 1.5px dashed transparent;
  transition: all 0.2s ease;
  font-weight: 400;
}
.people button.active {
  color: var(--ink);
  font-style: italic;
  border-bottom-color: var(--terracotta);
}
.people button:hover:not(.active) {
  color: var(--ink-soft);
}
.people .sep {
  color: var(--ink-ghost);
  margin: 0 2px;
}

.period {
  display: inline-flex;
  gap: 0;
  align-items: baseline;
}
.period button {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
  cursor: pointer;
  padding: 6px 12px;
  transition: color 0.2s ease;
  border-bottom: 1.5px solid transparent;
}
.period button.active {
  color: var(--terracotta);
  border-bottom-color: var(--terracotta);
}
.period button:hover:not(.active) {
  color: var(--ink-soft);
}

/* ──────────────────────────── Summary ──────────────────────────── */

.summary {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 32px 36px 30px;
  margin-bottom: 56px;
  position: relative;
  box-shadow: 0 1px 0 var(--paper-edge), 0 30px 50px -30px rgba(60, 40, 10, 0.18);
  animation: fadeInUp 0.7s 0.16s cubic-bezier(.22,.65,.27,1) both;
}

.summary::before {
  content: '';
  position: absolute;
  top: -1px; left: 32px; right: 32px;
  height: 3px;
  background: var(--terracotta);
}

.summary-kicker {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--terracotta);
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
}
.summary-kicker .meta {
  color: var(--ink-whisper);
  font-weight: 400;
  letter-spacing: 0.15em;
}

.lede {
  display: flex;
  align-items: baseline;
  gap: 18px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 22px;
  margin-bottom: 22px;
}
.lede-num {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 76px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--ink);
  font-variation-settings: "opsz" 72;
}
.lede-unit {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink-soft);
  font-weight: 400;
}
.lede-unit b {
  font-style: normal;
  font-weight: 400;
  color: var(--ink);
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.metric {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.metric-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-whisper);
}
.metric-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-feature-settings: "onum" 0, "lnum" 1;
}
.metric-value .unit {
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  margin-left: 1px;
}
.metric-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-whisper);
}
.metric.protein .metric-value { color: var(--sage); }
.metric.carbs .metric-value { color: var(--saffron); }
.metric.match .metric-value { color: var(--terracotta); }

/* ──────────────────────────── Day spreads ──────────────────────────── */

.day {
  margin-bottom: 64px;
  animation: fadeInUp 0.7s cubic-bezier(.22,.65,.27,1) both;
}
.day:nth-of-type(odd) { animation-delay: 0.24s; }
.day:nth-of-type(even) { animation-delay: 0.30s; }

.day-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--ink);
}
.day-head h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 32px;
  letter-spacing: -0.015em;
  color: var(--ink);
  font-variation-settings: "opsz" 36;
}
.day-head h2 em {
  font-style: italic;
  color: var(--terracotta);
}

.day-totals {
  display: flex;
  gap: 22px;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.day-totals span b {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 16px;
  font-style: italic;
  color: var(--ink);
  margin-right: 3px;
}
.day-totals .sep {
  color: var(--ink-ghost);
  font-weight: 400;
}

.meal {
  margin-bottom: 32px;
}
.meal:last-child { margin-bottom: 0; }

.meal-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.meal-head h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--ink);
}
.meal-head .ornament {
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.meal-head .meal-stat {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
}

.transcript {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-soft);
  margin: 14px 0 6px 12px;
  padding-left: 12px;
  border-left: 1px solid var(--ink-ghost);
  line-height: 1.45;
  position: relative;
}
.transcript::before {
  content: '“';
  position: absolute;
  left: -2px;
  top: -10px;
  font-size: 26px;
  font-style: normal;
  color: var(--ink-ghost);
  font-family: var(--serif);
}
.transcript-list { list-style: none; margin-bottom: 6px; }

.entries { list-style: none; }

.entry {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: baseline;
  gap: 18px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  position: relative;
  cursor: default;
  transition: background 0.2s ease;
}
.entry:hover { background: var(--card-hover); margin-inline: -10px; padding-inline: 10px; }
.entry:last-child { border-bottom: none; }

.entry .num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-ghost);
  letter-spacing: 0.05em;
  align-self: start;
  padding-top: 4px;
}

.entry-body { min-width: 0; }
.entry-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.3;
  display: block;
}
.entry-meta {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
  margin-top: 2px;
  display: block;
}
.entry-meta .estimated {
  color: var(--rose);
  cursor: pointer;
  border-bottom: 1px dotted var(--rose);
}
.entry-meta .estimated:hover { color: var(--terracotta); border-color: var(--terracotta); }
.entry-meta .sep { color: var(--ink-ghost); margin: 0 6px; }
.entry-meta .notes { font-style: italic; }

.entry-macros {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
}
.entry-kcal {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  color: var(--terracotta);
  letter-spacing: -0.01em;
  line-height: 1;
}
.entry-kcal .unit {
  font-family: var(--mono);
  font-size: 10px;
  font-style: normal;
  color: var(--ink-whisper);
  margin-left: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}
.entry-pcf {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  font-weight: 400;
  white-space: nowrap;
}
.entry-pcf .p { color: var(--sage); }
.entry-pcf .c { color: var(--saffron); }
.entry-pcf .f { color: var(--rose); }
.entry-pcf .sep { color: var(--ink-ghost); margin: 0 4px; }

.entry-actions {
  position: absolute;
  top: 14px;
  right: -8px;
  transform: translateX(100%);
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.entry:hover .entry-actions, .entry.expanded .entry-actions { opacity: 1; }
.entry-action {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink-soft);
  transition: all 0.18s ease;
  padding: 0;
}
.entry-action:hover {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}
.entry-action.delete:hover { color: var(--rose); border-color: var(--rose); }
.entry.expanded .entry-action.edit {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}

/* ───────── Inline edit panel ───────── */

.editor {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: minmax(180px, 0.6fr) 1fr;
  grid-template-areas: "meal meal" "grams search";
  gap: 22px 28px;
  margin-top: 14px;
  padding: 18px 20px 18px;
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-left: 2px solid var(--terracotta);
  border-radius: 2px;
  animation: fadeInUp 0.28s cubic-bezier(.22,.65,.27,1) both;
}
.editor-meal { grid-area: meal; }
.editor-grams { grid-area: grams; }
.editor-search { grid-area: search; }

.editor h4 {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-whisper);
  margin-bottom: 10px;
}

.meal-toggle {
  display: inline-flex;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
  overflow: hidden;
}
.meal-toggle button {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-soft);
  padding: 8px 14px;
  cursor: pointer;
  border-right: 1px solid var(--rule-soft);
  transition: all 0.18s ease;
}
.meal-toggle button:last-child { border-right: none; }
.meal-toggle button:hover { color: var(--terracotta); }
.meal-toggle button.active {
  background: var(--ink);
  color: var(--paper-warm);
}
.editor-grams {
  display: flex;
  flex-direction: column;
}
.editor-grams .row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.editor-grams input {
  width: 90px;
  padding: 6px 10px;
  font-family: var(--serif);
  font-size: 19px;
  font-style: italic;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
  color: var(--ink);
  outline: none;
  transition: border-color 0.18s ease;
}
.editor-grams input:focus { border-color: var(--terracotta); }
.editor-grams .unit {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-soft);
  font-style: italic;
}
.editor-grams .save-grams,
.editor-search .save-search {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
  background: var(--ink);
  color: var(--paper-warm);
  border: none;
  border-radius: 2px;
  padding: 7px 14px;
  margin-left: auto;
  cursor: pointer;
  transition: background 0.18s ease;
}
.editor-grams .save-grams:hover,
.editor-search .save-search:hover { background: var(--terracotta); }
.editor-grams .save-grams[disabled] { background: var(--ink-ghost); cursor: not-allowed; }
.editor-grams .hint {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-whisper);
  margin-top: 8px;
}

.editor-search {
  display: flex;
  flex-direction: column;
}
.editor-search input {
  width: 100%;
  padding: 8px 12px;
  font-family: var(--serif);
  font-size: 15px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
  color: var(--ink);
  outline: none;
  transition: border-color 0.18s ease;
}
.editor-search input::placeholder { color: var(--ink-ghost); font-style: italic; }
.editor-search input:focus { border-color: var(--terracotta); }
.editor-results {
  list-style: none;
  margin-top: 8px;
  max-height: 240px;
  overflow-y: auto;
  border-top: 1px solid var(--rule-soft);
}
.editor-results:empty { display: none; }
.editor-result {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background 0.15s ease;
}
.editor-result:last-child { border-bottom: none; }
.editor-result:hover { background: var(--card-hover); margin-inline: -8px; padding-inline: 12px; }
.editor-result-name {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  line-height: 1.3;
}
.editor-result-name .brand {
  color: var(--ink-soft);
  font-style: italic;
  margin-left: 4px;
}
.editor-result-meta {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-whisper);
  align-self: end;
  white-space: nowrap;
}
.editor-result-meta b {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  font-weight: 400;
  color: var(--terracotta);
  margin-right: 3px;
}
.editor-results .none {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
  padding: 10px 4px;
}

/* ──────────────────────────── States ──────────────────────────── */

.loading, .empty {
  text-align: center;
  padding: 80px 0;
  color: var(--ink-whisper);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.005em;
}
.loading::after {
  content: '…';
  display: inline-block;
  animation: dots 1.4s infinite;
}
.empty .ornament {
  display: block;
  font-size: 24px;
  color: var(--ink-ghost);
  margin-bottom: 10px;
  font-style: normal;
}

/* ──────────────────────────── Animations ──────────────────────────── */

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes dots {
  0%, 20% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}

/* ──────────────────────────── Mobile ──────────────────────────── */

@media (max-width: 640px) {
  body { padding: 22px 18px 60px; }
  .refresh-btn { top: 22px; right: 18px; width: 34px; height: 34px; }
  .masthead { margin: 16px 0 40px; }
  .wordmark { font-size: 64px; }
  .dek { font-size: 15px; }

  .toolbar { gap: 16px; }
  .people, .people button { font-size: 17px; }

  .summary { padding: 24px 22px 22px; margin-bottom: 40px; }
  .summary::before { left: 22px; right: 22px; }
  .lede-num { font-size: 56px; }
  .metrics {
    grid-template-columns: repeat(2, 1fr);
    gap: 18px 16px;
  }
  .metric-value { font-size: 22px; }

  .day { margin-bottom: 44px; }
  .day-head { flex-direction: column; gap: 8px; align-items: flex-start; padding-bottom: 8px; }
  .day-head h2 { font-size: 26px; }
  .day-totals { gap: 12px; font-size: 11px; flex-wrap: wrap; }
  .day-totals span b { font-size: 14px; }

  .entry {
    grid-template-columns: 22px 1fr;
    grid-template-rows: auto auto;
    gap: 6px 14px;
    padding: 12px 0;
  }
  .entry .num { grid-row: 1 / 2; padding-top: 2px; font-size: 10px; }
  .entry-body { grid-column: 2 / 3; grid-row: 1 / 2; }
  .entry-macros {
    grid-column: 2 / 3; grid-row: 2 / 3;
    flex-direction: row;
    align-items: baseline;
    justify-content: flex-start;
    gap: 12px;
  }
  .entry-kcal { font-size: 18px; }
  .entry-name { font-size: 16px; }

  .entry-actions {
    position: static;
    transform: none;
    opacity: 1;
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    margin-left: auto;
  }

  .editor {
    grid-template-columns: 1fr;
    grid-template-areas: "meal" "grams" "search";
    gap: 22px;
    padding: 16px;
    margin-top: 12px;
  }
  .editor-grams .save-grams { margin-left: 12px; }
  .meal-toggle { width: 100%; }
  .meal-toggle button { flex: 1; padding: 8px 6px; font-size: 9.5px; letter-spacing: 0.1em; }
}
</style>
</head>
<body>
<div class="page">

  <button class="refresh-btn" onclick="location.reload()" aria-label="Refresh" title="Refresh">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
    </svg>
  </button>

  <header class="masthead">
    <div class="kicker">est. <span id="masthead-year">2026</span> · vol. i</div>
    <h1 class="wordmark">Cal<span class="accent">Track</span></h1>
    <p class="dek">Mindful eating, visualized.</p>
  </header>

  <nav class="toolbar" aria-label="Filters">
    <div class="people" role="tablist" aria-label="Person">
      <span class="label">Plate of</span>
      <button role="tab" id="btn-nevil" onclick="toggleUser('Nevil')">Nevil</button>
      <span class="sep">&amp;</span>
      <button role="tab" id="btn-malou" onclick="toggleUser('Malou')">Malou</button>
    </div>
    <div class="period" role="tablist" aria-label="Period">
      <button role="tab" id="btn-1" onclick="setDays(1)">Today</button>
      <button role="tab" id="btn-7" onclick="setDays(7)">7 Days</button>
      <button role="tab" id="btn-30" onclick="setDays(30)">30 Days</button>
    </div>
  </nav>

  <main id="content">
    <div class="loading">Setting the table</div>
  </main>
</div>

<script>
// `__API_URL__` is replaced at deploy time by .github/workflows/deploy.yml.
// In local dev / preview, the literal placeholder remains — fall back to the
// public production endpoint so the dashboard works without the build step.
// The split-string keeps sed from replacing this reference too.
const API_URL_PLACEHOLDER = '__' + 'API_URL__';
const INJECTED_API_URL = '__API_URL__';
const API_URL = INJECTED_API_URL === API_URL_PLACEHOLDER
  ? 'https://ymstbwfufjysoanzfnjm.supabase.co/functions/v1/dashboard-api'
  : INJECTED_API_URL;

let selectedUsers = new Set(['Nevil', 'Malou']);
let currentDays = 7;
let allLogs = [];

document.getElementById('masthead-year').textContent = new Date().getFullYear();

/* ───────── Auto theme by device clock ─────────
 * Light from 07:00 to 19:00 local; dark otherwise. Re-evaluated every minute
 * and on visibility change so a long-running tab flips at sundown without
 * needing a refresh. iOS status bar follows via the meta theme-color tag.
 */
function applyAutoTheme() {
  const h = new Date().getHours();
  const dark = h < 7 || h >= 19;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#161210' : '#F4EEDF');
}
applyAutoTheme();
setInterval(applyAutoTheme, 60_000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) applyAutoTheme(); });

function toggleUser(user) {
  if (selectedUsers.has(user)) {
    if (selectedUsers.size > 1) selectedUsers.delete(user);
    else { selectedUsers.clear(); selectedUsers.add(user); }
  } else {
    selectedUsers.add(user);
  }
  updateButtons();
  renderData(allLogs);
}

function setDays(days) {
  currentDays = days;
  updateButtons();
  fetchData();
}

function updateButtons() {
  document.getElementById('btn-nevil').classList.toggle('active', selectedUsers.has('Nevil'));
  document.getElementById('btn-malou').classList.toggle('active', selectedUsers.has('Malou'));
  document.getElementById('btn-1').classList.toggle('active', currentDays === 1);
  document.getElementById('btn-7').classList.toggle('active', currentDays === 7);
  document.getElementById('btn-30').classList.toggle('active', currentDays === 30);
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  try {
    const res = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
    if (res.ok) {
      allLogs = allLogs.filter((log) => log.id !== id);
      renderData(allLogs);
    } else { alert('Failed to delete entry'); }
  } catch (e) { alert('Error deleting entry'); }
}

async function resyncEntry(id) {
  try {
    const res = await fetch(`${API_URL}?action=resync&id=${id}`, { method: 'POST' });
    if (res.ok) fetchData();
    else alert('Resync failed');
  } catch (e) { alert('Resync error'); }
}

/* ───────── Edit panel ───────── */

let expandedId = null;
let searchAbort = null;
let searchTimer = null;

function toggleEditor(id) {
  expandedId = expandedId === id ? null : id;
  renderData(allLogs);
}

async function saveGrams(id) {
  const input = document.querySelector(`#entry-${id} .grams-input`);
  if (!input) return;
  const grams = Number(input.value);
  if (!Number.isFinite(grams) || grams <= 0) {
    input.style.borderColor = 'var(--rose)';
    return;
  }
  const btn = document.querySelector(`#entry-${id} .save-grams`);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const res = await fetch(`${API_URL}?action=update-grams&id=${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ grams }),
    });
    if (!res.ok) throw new Error(await res.text());
    expandedId = null;
    await fetchData();
  } catch (e) {
    alert('Save failed: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
  }
}

function onSearchInput(id) {
  const input = document.querySelector(`#entry-${id} .search-input`);
  const list = document.querySelector(`#entry-${id} .editor-results`);
  if (!input || !list) return;
  const q = input.value.trim();
  if (searchTimer) clearTimeout(searchTimer);
  if (searchAbort) searchAbort.abort();
  if (q.length < 2) { list.innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    searchAbort = new AbortController();
    try {
      const res = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`, {
        signal: searchAbort.signal,
      });
      const data = await res.json();
      renderSearchResults(id, data.results || []);
    } catch (e) {
      if (e.name !== 'AbortError') console.error('Search error', e);
    }
  }, 220);
}

function renderSearchResults(id, results) {
  const list = document.querySelector(`#entry-${id} .editor-results`);
  if (!list) return;
  if (!results.length) {
    list.innerHTML = '<li class="none">No matches.</li>';
    return;
  }
  list.innerHTML = results.map((r) => `
    <li class="editor-result" onclick="relink('${id}', ${r.fdc_id})">
      <span class="editor-result-name">
        ${escapeHtml(r.name)}${r.brand ? `<span class="brand">— ${escapeHtml(r.brand)}</span>` : ''}
      </span>
      <span class="editor-result-meta"><b>${r.kcal_per_100g}</b>kcal / 100g</span>
    </li>
  `).join('');
}

async function relink(id, fdcId) {
  try {
    const res = await fetch(`${API_URL}?action=relink&id=${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fdc_id: fdcId }),
    });
    if (!res.ok) throw new Error(await res.text());
    expandedId = null;
    await fetchData();
  } catch (e) {
    alert('Relink failed: ' + (e.message || e));
  }
}

async function updateMeal(id, meal) {
  try {
    const res = await fetch(`${API_URL}?action=update-meal&id=${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ meal }),
    });
    if (!res.ok) throw new Error(await res.text());
    await fetchData();
  } catch (e) {
    alert('Could not change meal: ' + (e.message || e));
  }
}

async function fetchData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Setting the table</div>';
  try {
    const res = await fetch(`${API_URL}?days=${currentDays}`);
    const data = await res.json();
    allLogs = data.logs || [];
    renderData(allLogs);
  } catch (e) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>Unable to load data.</div>';
  }
}

/* ───────── helpers ───────── */

const r0 = (n) => Math.round(Number(n) || 0);
const r1 = (n) => Math.round((Number(n) || 0) * 10) / 10;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function formatDayHead(dateStr) {
  const d = new Date(dateStr);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();

  const weekday = d.toLocaleDateString('en-GB', { weekday: 'long' });
  const month = d.toLocaleDateString('en-GB', { month: 'long' });
  const day = ordinal(d.getDate());

  let prefix = '';
  if (sameDay(d, today)) prefix = 'Today, ';
  else if (sameDay(d, yesterday)) prefix = 'Yesterday, ';
  return `${prefix}<em>${weekday}</em>, ${month} ${day}`;
}

function dayKey(dateStr) {
  return new Date(dateStr).toISOString().slice(0, 10);
}

function mealOf(dateStr) {
  // The Edge Function stores canonical meal times in UTC (8 / 12:30 / 15 / 19).
  // Bucket by UTC hours so meal labels stay correct regardless of the
  // viewer's local timezone.
  const h = new Date(dateStr).getUTCHours();
  if (h < 11) return { key: 'breakfast', label: 'Breakfast', order: 0 };
  if (h < 14) return { key: 'lunch', label: 'Lunch', order: 1 };
  if (h < 17) return { key: 'snack', label: 'Snack', order: 2 };
  return { key: 'dinner', label: 'Dinner', order: 3 };
}

function periodLabel() {
  if (currentDays === 1) return 'Today';
  return `Last ${currentDays} days`;
}

function periodMeta() {
  if (currentDays === 1) return new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  const start = new Date(); start.setDate(start.getDate() - currentDays + 1);
  const end = new Date();
  const fmt = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return `${fmt(start)} — ${fmt(end)}`;
}

/* ───────── render ───────── */

function renderData(logs) {
  const content = document.getElementById('content');

  if (selectedUsers.size === 0) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>Select a person to view their meals.</div>';
    return;
  }

  const filtered = logs.filter((l) => selectedUsers.has(l.user_name));
  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>No meals logged yet.</div>';
    return;
  }

  /* group: day → user → meal → entries  */
  const days = new Map(); // dayKey → { dateStr, byUser: Map<user, Map<mealKey, {meal, entries}>> }
  for (const log of filtered) {
    const k = dayKey(log.entry_date);
    if (!days.has(k)) days.set(k, { dateStr: log.entry_date, byUser: new Map() });
    const day = days.get(k);
    const u = log.user_name || 'Unknown';
    if (!day.byUser.has(u)) day.byUser.set(u, new Map());
    const userMeals = day.byUser.get(u);
    const meal = mealOf(log.entry_date);
    if (!userMeals.has(meal.key)) userMeals.set(meal.key, { meal, entries: [] });
    userMeals.get(meal.key).entries.push(log);
  }

  /* summary across the whole filtered range */
  let totalKcal = 0, totalP = 0, totalC = 0, totalF = 0;
  let matched = 0, tracked = 0;
  for (const log of filtered) {
    totalKcal += Number(log.calories) || 0;
    totalP += Number(log.protein_g) || 0;
    totalC += Number(log.carbs_g) || 0;
    totalF += Number(log.fat_g) || 0;
    if (log.usda_status) {
      tracked++;
      if (log.usda_status === 'matched') matched++;
    }
  }
  const dayCount = days.size;
  const avgKcal = dayCount ? Math.round(totalKcal / dayCount) : 0;
  const avgP = dayCount ? Math.round(totalP / dayCount) : 0;
  const avgC = dayCount ? Math.round(totalC / dayCount) : 0;
  const avgF = dayCount ? Math.round(totalF / dayCount) : 0;
  const matchPct = tracked ? Math.round((matched / tracked) * 100) : null;

  let html = renderSummary({
    avgKcal, avgP, avgC, avgF,
    totalKcal: r0(totalKcal), totalP: r0(totalP), totalC: r0(totalC), totalF: r0(totalF),
    dayCount, entries: filtered.length, matchPct, matched, tracked,
  });

  /* day spreads, newest first */
  const sortedDays = [...days.values()].sort((a, b) => new Date(b.dateStr) - new Date(a.dateStr));
  for (const day of sortedDays) {
    html += renderDay(day);
  }

  content.innerHTML = html;
}

function renderSummary(s) {
  const single = currentDays === 1;
  const ledeNum = single ? s.totalKcal : s.avgKcal;
  const ledeUnit = single ? '<b>kcal</b> today' : '<b>kcal</b> per day, on average';
  const proteinValue = single ? s.totalP : s.avgP;
  const carbsValue = single ? s.totalC : s.avgC;
  const proteinSub = single ? 'today' : `${s.totalP}g total`;
  const carbsSub = single ? 'today' : `${s.totalC}g total`;
  return `
    <section class="summary">
      <div class="summary-kicker">
        <span>${escapeHtml(periodLabel())}</span>
        <span class="meta">${escapeHtml(periodMeta())}</span>
      </div>
      <div class="lede">
        <span class="lede-num">${ledeNum.toLocaleString('en-US')}</span>
        <span class="lede-unit">${ledeUnit}</span>
      </div>
      <div class="metrics">
        <div class="metric protein">
          <span class="metric-label">Protein${single ? '' : ' / day'}</span>
          <span class="metric-value">${proteinValue}<span class="unit">g</span></span>
          <span class="metric-sub">${proteinSub}</span>
        </div>
        <div class="metric carbs">
          <span class="metric-label">Carbs${single ? '' : ' / day'}</span>
          <span class="metric-value">${carbsValue}<span class="unit">g</span></span>
          <span class="metric-sub">${carbsSub}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Entries</span>
          <span class="metric-value">${s.entries}</span>
          <span class="metric-sub">${s.dayCount} ${s.dayCount === 1 ? 'day' : 'days'}</span>
        </div>
        <div class="metric match">
          <span class="metric-label">USDA match</span>
          <span class="metric-value">${s.matchPct === null ? '—' : s.matchPct + '<span class="unit">%</span>'}</span>
          <span class="metric-sub">${s.matchPct === null ? 'no data' : `${s.matched} of ${s.tracked}`}</span>
        </div>
      </div>
    </section>
  `;
}

function renderDay(day) {
  const userBlocks = [];
  // sort users alphabetically for stable order
  const users = [...day.byUser.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  for (const [userName, userMeals] of users) {
    let dayKcal = 0, dayP = 0, dayC = 0, dayF = 0;
    const meals = [...userMeals.values()].sort((a, b) => a.meal.order - b.meal.order);
    let mealsHtml = '';
    let entryIdx = 0;
    for (const { meal, entries } of meals) {
      // Group entries by submission first (raw_input + minute bucket of
      // created_at) so the transcript appears once per spoken entry and all
      // its items stay together. Sorting by entry_date alone interleaves
      // submissions because parse-food stores the same canonical meal hour
      // for every item.
      const subMap = new Map();
      for (const e of entries) {
        const minuteBucket = e.created_at ? e.created_at.slice(0, 16) : '';
        const key = `${e.raw_input || ''}::${minuteBucket}`;
        if (!subMap.has(key)) {
          subMap.set(key, { key, raw_input: e.raw_input || '', entries: [], firstCreated: e.created_at });
        }
        subMap.get(key).entries.push(e);
      }
      // Submissions ordered by when they were actually logged.
      const submissions = [...subMap.values()].sort(
        (a, b) => new Date(a.firstCreated) - new Date(b.firstCreated),
      );
      for (const sub of submissions) {
        sub.entries.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }

      let mealKcal = 0;
      let submissionsHtml = '';
      for (const sub of submissions) {
        let entriesHtml = '';
        for (const e of sub.entries) {
          entryIdx++;
          const kcal = r0(e.calories);
          const p = r0(e.protein_g);
          const c = r0(e.carbs_g);
          const f = r0(e.fat_g);
          dayKcal += kcal; dayP += p; dayC += c; dayF += f;
          mealKcal += kcal;
          entriesHtml += renderEntry(e, entryIdx, kcal, p, c, f);
        }
        // Skip the transcript line if it's identical to the only entry's
        // food_name (no value in showing the same string twice).
        const showTranscript =
          sub.raw_input &&
          !(sub.entries.length === 1 && sub.raw_input.trim() === (sub.entries[0].food_name || '').trim());
        const transcriptHtml = showTranscript
          ? `<div class="transcript">${escapeHtml(sub.raw_input)}</div>`
          : '';
        submissionsHtml += `
          <div class="transcript-list">
            ${transcriptHtml}
            <ul class="entries">${entriesHtml}</ul>
          </div>
        `;
      }

      mealsHtml += `
        <div class="meal">
          <div class="meal-head">
            <h3>${escapeHtml(meal.label)}</h3>
            <span class="ornament"></span>
            <span class="meal-stat">${mealKcal.toLocaleString('en-US')} kcal</span>
          </div>
          ${submissionsHtml}
        </div>
      `;
    }
    userBlocks.push(`
      <article class="day">
        <header class="day-head">
          <h2>${formatDayHead(day.dateStr)}${users.length > 1 ? ` <em>· ${escapeHtml(userName)}</em>` : ''}</h2>
          <div class="day-totals">
            <span><b>${dayKcal.toLocaleString('en-US')}</b>kcal</span>
            <span class="sep">·</span>
            <span><b>${dayP}</b>g protein</span>
            <span class="sep">·</span>
            <span><b>${dayC}</b>g carbs</span>
            <span class="sep">·</span>
            <span><b>${dayF}</b>g fat</span>
          </div>
        </header>
        ${mealsHtml}
      </article>
    `);
  }
  return userBlocks.join('');
}

function renderEntry(e, idx, kcal, p, c, f) {
  const grams = e.usda_grams ? `<span class="grams">${r0(e.usda_grams)}g</span>` : '';
  const estimated = e.usda_status && e.usda_status !== 'matched'
    ? `<span class="estimated" onclick="event.stopPropagation();resyncEntry('${e.id}')" title="Click to retry USDA match">estimated</span>`
    : '';
  const notes = e.notes ? `<span class="notes">"${escapeHtml(e.notes)}"</span>` : '';
  const metaParts = [grams, estimated, notes].filter(Boolean).join('<span class="sep">·</span>');
  const isExpanded = expandedId === e.id;
  return `
    <li class="entry${isExpanded ? ' expanded' : ''}" id="entry-${e.id}">
      <span class="num">${String(idx).padStart(2, '0')}</span>
      <div class="entry-body">
        <span class="entry-name">${escapeHtml(e.food_name || e.raw_input)}</span>
        ${metaParts ? `<span class="entry-meta">${metaParts}</span>` : ''}
      </div>
      <div class="entry-macros">
        <span class="entry-kcal">${kcal.toLocaleString('en-US')}<span class="unit">kcal</span></span>
        <span class="entry-pcf">
          <span class="p">${p}p</span><span class="sep">·</span><span class="c">${c}c</span><span class="sep">·</span><span class="f">${f}f</span>
        </span>
      </div>
      <div class="entry-actions">
        <button class="entry-action edit" onclick="toggleEditor('${e.id}')" title="${isExpanded ? 'Close editor' : 'Edit'}" aria-label="Edit entry">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="entry-action delete" onclick="deleteEntry('${e.id}')" title="Delete" aria-label="Delete entry">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
      </div>
      ${isExpanded ? renderEditor(e) : ''}
    </li>
  `;
}

function renderEditor(e) {
  const currentGrams = e.usda_grams ? r0(e.usda_grams) : 100;
  const fdcId = e.usda_fdc_id || null;
  const isMatched = e.usda_status === 'matched';
  const meal = mealOf(e.entry_date).key;
  const mealBtn = (k, label) =>
    `<button class="${meal === k ? 'active' : ''}" onclick="updateMeal('${e.id}', '${k}')">${label}</button>`;
  return `
    <div class="editor" onclick="event.stopPropagation()">
      <div class="editor-meal">
        <h4>Meal</h4>
        <div class="meal-toggle">
          ${mealBtn('breakfast', 'Breakfast')}
          ${mealBtn('lunch', 'Lunch')}
          ${mealBtn('snack', 'Snack')}
          ${mealBtn('dinner', 'Dinner')}
        </div>
      </div>
      <div class="editor-grams">
        <h4>Quantity</h4>
        <div class="row">
          <input class="grams-input" type="number" min="1" step="1" value="${currentGrams}" />
          <span class="unit">g</span>
          <button class="save-grams" onclick="saveGrams('${e.id}')">Save</button>
        </div>
        <div class="hint">${
          isMatched
            ? `Macros recompute from USDA <em>${escapeHtml(e.food_name || '')}</em>${fdcId ? ` <span style="color:var(--ink-ghost)">(FDC ${escapeHtml(fdcId)})</span>` : ''}.`
            : `Estimated entry — only the gram weight changes; macros stay as Claude's guess.`
        }</div>
      </div>
      <div class="editor-search">
        <h4>Replace with another USDA food</h4>
        <input class="search-input" type="search" placeholder="Search USDA FoodData Central…" oninput="onSearchInput('${e.id}')" autocomplete="off" />
        <ul class="editor-results"></ul>
      </div>
    </div>
  `;
}

updateButtons();
fetchData();
</script>
</body>
</html>
