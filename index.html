<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#F0E9DA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CalTrack">
<title>CalTrack — Mindful eating, visualized</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* paper */
  --paper:        #F4EEDF;
  --paper-warm:   #F8F2E4;
  --paper-edge:   #E5DBC6;
  --card:         #FCF7E9;
  --card-hover:   #FFFAEC;

  /* ink */
  --ink:          #1A140C;
  --ink-soft:     #5C4F3A;
  --ink-whisper:  #9C8E72;
  --ink-ghost:    #C4B89C;

  /* hairline */
  --rule:         rgba(26, 20, 12, 0.10);
  --rule-soft:    rgba(26, 20, 12, 0.05);

  /* food palette */
  --terracotta:   #B14A2D;
  --terracotta-soft: rgba(177, 74, 45, 0.08);
  --sage:         #5C7547;
  --sage-soft:    rgba(92, 117, 71, 0.10);
  --saffron:      #C18935;
  --saffron-soft: rgba(193, 137, 53, 0.10);
  --rose:         #8C3F31;

  /* type */
  --serif:        'Newsreader', 'EB Garamond', Georgia, serif;
  --mono:         'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* rhythm */
  --gutter: 28px;
  --max-w:  720px;

  /* warm wash at top of page */
  --wash:         rgba(255, 226, 175, 0.18);
}

[data-theme="dark"] {
  /* midnight cookbook — deep umber paper, warm cream ink */
  --paper:        #161210;
  --paper-warm:   #1E1916;
  --paper-edge:   #0D0A09;
  --card:         #1E1916;
  --card-hover:   #2A231F;

  --ink:          #ECE0CB;
  --ink-soft:     #B5A48B;
  --ink-whisper:  #786A55;
  --ink-ghost:    #4A4234;

  --rule:         rgba(236, 224, 203, 0.12);
  --rule-soft:    rgba(236, 224, 203, 0.05);

  --terracotta:   #DA8463;
  --terracotta-soft: rgba(218, 132, 99, 0.12);
  --sage:         #A6BF80;
  --sage-soft:    rgba(166, 191, 128, 0.12);
  --saffron:      #E1B461;
  --saffron-soft: rgba(225, 180, 97, 0.12);
  --rose:         #CB8472;

  --wash:         rgba(218, 132, 99, 0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
}

body {
  font-family: var(--serif);
  font-feature-settings: "kern", "liga", "onum", "ss01";
  font-optical-sizing: auto;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px var(--gutter) 80px;
  padding-top: max(28px, env(safe-area-inset-top));
  padding-bottom: max(80px, env(safe-area-inset-bottom));
  position: relative;
  overflow-x: hidden;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.4s ease, color 0.4s ease;
}

/* warm light gradient at top — quiet support, not texture */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; height: 360px;
  background: radial-gradient(ellipse 80% 100% at 50% 0%, var(--wash), transparent 75%);
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.4s ease;
}

html { transition: background-color 0.4s ease; background: var(--paper); }

.page {
  max-width: var(--max-w);
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ───────────────────────────── Masthead ───────────────────────────── */

.masthead {
  text-align: center;
  margin: 24px 0 56px;
  animation: fadeInUp 0.7s cubic-bezier(.22,.65,.27,1) both;
}

.kicker {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-whisper);
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.kicker::before, .kicker::after {
  content: '';
  width: 30px; height: 1px;
  background: var(--ink-ghost);
}

.wordmark {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: clamp(56px, 11vw, 92px);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 72;
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.wordmark .accent {
  color: var(--terracotta);
  font-style: italic;
}

.dek {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  color: var(--ink-soft);
  margin-top: 14px;
  letter-spacing: 0.005em;
}

.toolbar-btns {
  position: absolute;
  top: 32px;
  right: var(--gutter);
  z-index: 5;
}
.menu-btn {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 38px; height: 38px;
  cursor: pointer;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  padding: 0;
}
.menu-btn:hover, .menu-btn.open {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}
.menu-btn.open svg { transform: rotate(90deg); }
.menu-btn svg { transition: transform 0.25s ease; }

.menu-pop {
  position: absolute;
  top: 48px;
  right: 0;
  min-width: 220px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 4px;
  box-shadow: 0 1px 0 var(--paper-edge), 0 24px 50px -16px rgba(60, 40, 10, 0.28);
  padding: 6px 0;
  display: none;
  animation: menuIn 0.22s cubic-bezier(.22,.65,.27,1) both;
}
.menu-pop::before {
  content: '';
  position: absolute;
  top: -1px; left: 14px; right: 14px;
  height: 2px;
  background: var(--terracotta);
}
.menu-pop[data-open="true"] { display: block; }
.menu-pop button {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink);
  padding: 11px 18px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease;
}
.menu-pop button:hover {
  background: var(--card-hover);
  color: var(--terracotta);
}
.menu-pop button em {
  font-style: italic;
  color: var(--terracotta);
}
.menu-pop button .ico {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-pop button:hover .ico { color: var(--terracotta); }
.menu-pop .sep {
  height: 1px;
  background: var(--rule-soft);
  margin: 4px 14px;
}
.menu-pop .menu-hint {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-whisper);
  padding: 8px 18px 4px;
}

@keyframes menuIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ───────── Library badge on entries ───────── */
.entry-meta .lib-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--saffron);
  border-bottom: 1px dotted var(--saffron);
  padding-bottom: 1px;
}
.entry-meta .lib-badge.recipe { color: var(--terracotta); border-color: var(--terracotta); }
.entry-meta .lib-badge.custom { color: var(--sage); border-color: var(--sage); }

/* ───────── Library modal ───────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26, 20, 12, 0.55);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 20px;
  overflow-y: auto;
  animation: fadeIn 0.2s ease both;
}
[data-theme="dark"] .modal-backdrop { background: rgba(0, 0, 0, 0.7); }

.modal {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 4px;
  width: 100%;
  max-width: 760px;
  box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.45);
  position: relative;
  animation: fadeInUp 0.3s cubic-bezier(.22,.65,.27,1) both;
}
.modal::before {
  content: '';
  position: absolute;
  top: -1px; left: 36px; right: 36px;
  height: 3px;
  background: var(--terracotta);
}
.modal-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--rule);
}
.modal-head h2 {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 32px;
  letter-spacing: -0.015em;
}
.modal-head h2 em { color: var(--terracotta); font-style: italic; }
.modal-close {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 6px 8px;
}
.modal-close:hover { color: var(--terracotta); }

.modal-tabs {
  display: flex;
  gap: 0;
  padding: 0 32px;
  border-bottom: 1px solid var(--rule);
}
.modal-tabs button {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-whisper);
  cursor: pointer;
  padding: 14px 18px;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
}
.modal-tabs button.active {
  color: var(--terracotta);
  border-bottom-color: var(--terracotta);
}
.modal-tabs button:hover:not(.active) { color: var(--ink-soft); }

.modal-body { padding: 24px 32px 32px; }
.modal-empty {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--ink-whisper);
  text-align: center;
  padding: 32px 0 24px;
}

.lib-list { list-style: none; }
.lib-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: baseline;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.lib-row:last-child { border-bottom: none; }
.lib-row .name {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--ink);
}
.lib-row .name .brand {
  color: var(--ink-soft);
  font-style: italic;
  margin-left: 4px;
  font-size: 14px;
}
.lib-row .meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-whisper);
  letter-spacing: 0.04em;
}
.lib-row .meta b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--terracotta);
  margin-right: 2px;
}
.lib-row .acts { display: flex; gap: 4px; }
.lib-row .acts button {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink-soft);
  padding: 0;
  transition: all 0.18s ease;
}
.lib-row .acts button:hover { color: var(--terracotta); border-color: var(--terracotta); }
.lib-row .acts button.del:hover { color: var(--rose); border-color: var(--rose); }

.add-btn {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
  background: var(--ink);
  color: var(--paper-warm);
  border: none;
  border-radius: 2px;
  padding: 9px 16px;
  cursor: pointer;
  margin-bottom: 18px;
  transition: background 0.18s ease;
}
.add-btn:hover { background: var(--terracotta); }
.add-btn.secondary {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--rule);
}
.add-btn.secondary:hover {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}

/* Forms */
.form { display: grid; gap: 14px; }
.form-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  align-items: center;
  gap: 14px;
}
.form-row label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-whisper);
  font-weight: 500;
}
.form-row input, .form-row textarea {
  font-family: var(--serif);
  font-size: 15px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 7px 10px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.18s ease;
  width: 100%;
}
.form-row input:focus, .form-row textarea:focus { border-color: var(--terracotta); }
.form-row.macros {
  grid-template-columns: 130px repeat(4, 1fr);
  gap: 8px 14px;
}
.form-row.macros label { grid-column: 1 / 2; }
.form-row.macros .group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-row.macros .group span {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
}
.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}
.form-cancel {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-whisper);
  cursor: pointer;
  padding: 8px 12px;
}
.form-cancel:hover { color: var(--ink-soft); }
.form-save {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
  background: var(--ink);
  color: var(--paper-warm);
  border: none;
  border-radius: 2px;
  padding: 9px 16px;
  cursor: pointer;
}
.form-save:hover { background: var(--terracotta); }

/* Recipe ingredients editor */
.ing-rows { display: flex; flex-direction: column; gap: 8px; }
.ing-row {
  display: grid;
  grid-template-columns: 1fr 80px 30px;
  grid-template-rows: auto auto;
  column-gap: 10px;
  row-gap: 2px;
  align-items: center;
  padding: 9px 10px 8px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 2px;
  position: relative;
}
.ing-row .name {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  grid-column: 1 / 2;
  grid-row: 1 / 2;
}
.ing-row .name .source {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-whisper);
  margin-right: 6px;
}
.ing-row .ing-macros {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--ink-whisper);
  grid-column: 1 / 2;
  grid-row: 2 / 3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ing-row .ing-macros b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 12.5px;
  color: var(--terracotta);
  margin-right: 1px;
}
.ing-row .ing-macros .p { color: var(--sage); }
.ing-row .ing-macros .c { color: var(--saffron); }
.ing-row .ing-macros .f { color: var(--rose); }
.ing-row .ing-macros .sep { color: var(--ink-ghost); margin: 0 4px; }
.ing-row input.grams { grid-column: 2 / 3; grid-row: 1 / 3; }
.ing-row .ing-del { grid-column: 3 / 4; grid-row: 1 / 3; }
.ing-row .servings-wrap {
  grid-column: 2 / 3;
  grid-row: 1 / 3;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
}
.ing-row .servings-wrap input.servings {
  font-family: var(--serif);
  font-size: 14px;
  text-align: right;
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 5px 8px;
  width: 50px;
  color: var(--ink);
  outline: none;
}
.ing-row .servings-wrap input.servings:focus { border-color: var(--terracotta); }
.ing-row .servings-wrap .label {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
}

/* Quick-add chips for most-used meals */
.ql-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 8px 0 12px;
}
.ql-chips .label {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-whisper);
  width: 100%;
  margin-bottom: 2px;
}
.ql-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 999px;
  padding: 5px 12px;
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.18s ease;
}
.ql-chip:hover {
  background: var(--card-hover);
  border-color: var(--terracotta);
  color: var(--terracotta);
}
.ql-chip .uses {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.05em;
  color: var(--ink-whisper);
  font-weight: 500;
}
.ql-chip[disabled] { opacity: 0.4; cursor: default; pointer-events: none; }
.ing-row input.grams {
  font-family: var(--serif);
  font-size: 14px;
  text-align: right;
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 5px 8px;
  width: 70px;
  color: var(--ink);
  outline: none;
}
.ing-row input.grams:focus { border-color: var(--terracotta); }
.ing-row .ing-del {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--ink-ghost);
  font-size: 18px;
  padding: 0;
  line-height: 1;
}
.ing-row .ing-del:hover { color: var(--rose); }

.ing-search {
  position: relative;
  margin-top: 6px;
}
.ing-search input {
  width: 100%;
  font-family: var(--serif);
  font-size: 14px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 7px 10px;
  color: var(--ink);
  outline: none;
}
.ing-search input:focus { border-color: var(--terracotta); }
.ing-search .results {
  list-style: none;
  margin-top: 4px;
  max-height: 220px;
  overflow-y: auto;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
}
.ing-search .results:empty { display: none; }
.ing-search .results li {
  padding: 7px 10px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--rule-soft);
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.ing-search .results li:last-child { border-bottom: none; }
.ing-search .results li:hover { background: var(--card-hover); }
.ing-search .results li .src {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
}
.ing-search .create-cf {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  background: transparent;
  border: 1px dashed var(--rule);
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  padding: 9px 10px;
  margin-top: 6px;
  cursor: pointer;
  transition: all 0.18s ease;
}
.ing-search .create-cf:hover {
  border-color: var(--terracotta);
  color: var(--terracotta);
  border-style: solid;
}
.ing-search .create-cf b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  color: var(--ink);
  text-transform: none;
  letter-spacing: 0;
}

/* Quick-add custom food form inside meal creator */
.cf-quick {
  border: 1px solid var(--rule);
  border-left: 2px solid var(--terracotta);
  border-radius: 2px;
  background: var(--paper-warm);
  padding: 14px 16px;
  margin-top: 8px;
  display: grid;
  gap: 10px;
}
.cf-quick h5 {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink-whisper);
}
.cf-quick .cf-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  align-items: center;
  gap: 10px;
}
.cf-quick label {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-whisper);
}
.cf-quick input {
  font-family: var(--serif);
  font-size: 14px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 6px 9px;
  color: var(--ink);
  outline: none;
  width: 100%;
  transition: border-color 0.18s ease;
}
.cf-quick input:focus { border-color: var(--terracotta); }
.cf-quick .cf-macros {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.cf-quick .cf-macros .group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cf-quick .cf-macros .group span {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
}
.cf-quick .cf-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 4px;
}
.cf-quick .cf-actions button {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
  border: none;
  border-radius: 2px;
  padding: 8px 14px;
  cursor: pointer;
}
.cf-quick .cf-actions .cancel {
  background: none;
  color: var(--ink-whisper);
}
.cf-quick .cf-actions .cancel:hover { color: var(--ink-soft); }
.cf-quick .cf-actions .save {
  background: var(--ink);
  color: var(--paper-warm);
}
.cf-quick .cf-actions .save:hover { background: var(--terracotta); }
.ing-totals {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  text-align: right;
  margin-top: 8px;
  letter-spacing: 0.04em;
}
.ing-totals b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--terracotta);
  margin-right: 3px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ──────────────────────────── Toolbar ──────────────────────────── */

.toolbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 44px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  animation: fadeInUp 0.7s 0.08s cubic-bezier(.22,.65,.27,1) both;
}

.people {
  font-family: var(--serif);
  font-size: 19px;
}
.people .label {
  font-style: italic;
  color: var(--ink-whisper);
  margin-right: 12px;
  font-size: 13px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: var(--mono);
  font-weight: 500;
}
.people button {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink-ghost);
  cursor: pointer;
  padding: 4px 4px;
  margin-right: 6px;
  border-bottom: 1.5px dashed transparent;
  transition: all 0.2s ease;
  font-weight: 400;
}
.people button.active {
  color: var(--ink);
  font-style: italic;
  border-bottom-color: var(--terracotta);
}
.people button:hover:not(.active) {
  color: var(--ink-soft);
}
.people .sep {
  color: var(--ink-ghost);
  margin: 0 2px;
}

.period {
  display: inline-flex;
  gap: 0;
  align-items: baseline;
}
.period button {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
  cursor: pointer;
  padding: 6px 12px;
  transition: color 0.2s ease;
  border-bottom: 1.5px solid transparent;
}
.period button.active {
  color: var(--terracotta);
  border-bottom-color: var(--terracotta);
}
.period button:hover:not(.active) {
  color: var(--ink-soft);
}

/* ──────────────────────────── Summary ──────────────────────────── */

.summary {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 32px 36px 30px;
  margin-bottom: 56px;
  position: relative;
  box-shadow: 0 1px 0 var(--paper-edge), 0 30px 50px -30px rgba(60, 40, 10, 0.18);
  animation: fadeInUp 0.7s 0.16s cubic-bezier(.22,.65,.27,1) both;
}

.summary::before {
  content: '';
  position: absolute;
  top: -1px; left: 32px; right: 32px;
  height: 3px;
  background: var(--terracotta);
}

.summary-kicker {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--terracotta);
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
}
.summary-kicker .meta {
  color: var(--ink-whisper);
  font-weight: 400;
  letter-spacing: 0.15em;
}

.lede {
  display: flex;
  align-items: baseline;
  gap: 18px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 22px;
  margin-bottom: 22px;
}
.lede-num {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 76px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--ink);
  font-variation-settings: "opsz" 72;
}
.lede-unit {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink-soft);
  font-weight: 400;
}
.lede-unit b {
  font-style: normal;
  font-weight: 400;
  color: var(--ink);
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.metric {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.metric-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-whisper);
}
.metric-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-feature-settings: "onum" 0, "lnum" 1;
}
.metric-value .unit {
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  margin-left: 1px;
}
.metric-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-whisper);
}
.metric-goal {
  margin-top: 4px;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-whisper);
  display: flex;
  align-items: center;
  gap: 6px;
}
.metric-goal b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 12px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--ink-soft);
}
.metric-goal .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink-ghost);
  flex-shrink: 0;
}
.metric-goal .dot.under  { background: var(--ink-ghost); }
.metric-goal .dot.in     { background: var(--sage); }
.metric-goal .dot.over   { background: var(--rose); }
.lede-goal {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-whisper);
  margin-top: -16px;
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 8px;
}
.lede-goal b {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--ink-soft);
}
.metric.protein .metric-value { color: var(--sage); }
.metric.carbs .metric-value { color: var(--saffron); }
.metric.fat .metric-value { color: var(--rose); }

/* ──────────────────────────── Day spreads ──────────────────────────── */

.day {
  margin-bottom: 64px;
  animation: fadeInUp 0.7s cubic-bezier(.22,.65,.27,1) both;
}
.day:nth-of-type(odd) { animation-delay: 0.24s; }
.day:nth-of-type(even) { animation-delay: 0.30s; }

.day-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--ink);
}
.day-head h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 32px;
  letter-spacing: -0.015em;
  color: var(--ink);
  font-variation-settings: "opsz" 36;
}
.day-head h2 em {
  font-style: italic;
  color: var(--terracotta);
}

.day-totals {
  display: flex;
  gap: 22px;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.day-totals span b {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 16px;
  font-style: italic;
  color: var(--ink);
  margin-right: 3px;
}
.day-totals .sep {
  color: var(--ink-ghost);
  font-weight: 400;
}

.meal {
  margin-bottom: 32px;
}
.meal:last-child { margin-bottom: 0; }

.meal-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.meal-head h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--ink);
}
.meal-head .ornament {
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.meal-head .meal-stat {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
}

.transcript {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-soft);
  margin: 14px 0 6px 12px;
  padding-left: 12px;
  border-left: 1px solid var(--ink-ghost);
  line-height: 1.45;
  position: relative;
}
.transcript::before {
  content: '“';
  position: absolute;
  left: -2px;
  top: -10px;
  font-size: 26px;
  font-style: normal;
  color: var(--ink-ghost);
  font-family: var(--serif);
}
.transcript-list { list-style: none; margin-bottom: 6px; }

.entries { list-style: none; }

.entry {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: baseline;
  gap: 18px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  position: relative;
  cursor: default;
  transition: background 0.2s ease;
}
.entry:hover { background: var(--card-hover); margin-inline: -10px; padding-inline: 10px; }
.entry:last-child { border-bottom: none; }

.entry .num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-ghost);
  letter-spacing: 0.05em;
  align-self: start;
  padding-top: 4px;
}

.entry-body { min-width: 0; }
.entry-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.3;
  display: block;
}
.entry-meta {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
  margin-top: 2px;
  display: block;
}
.entry-meta .estimated {
  color: var(--rose);
  cursor: pointer;
  border-bottom: 1px dotted var(--rose);
}
.entry-meta .estimated:hover { color: var(--terracotta); border-color: var(--terracotta); }
.entry-meta .ai-badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-whisper);
  border-bottom: 1px dotted var(--ink-whisper);
  padding-bottom: 1px;
}
.entry-meta .sep { color: var(--ink-ghost); margin: 0 6px; }
.entry-meta .notes { font-style: italic; }

.entry-macros {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
}
.entry-kcal {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  color: var(--terracotta);
  letter-spacing: -0.01em;
  line-height: 1;
}
.entry-kcal .unit {
  font-family: var(--mono);
  font-size: 10px;
  font-style: normal;
  color: var(--ink-whisper);
  margin-left: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}
.entry-pcf {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  font-weight: 400;
  white-space: nowrap;
}
.entry-pcf .p { color: var(--sage); }
.entry-pcf .c { color: var(--saffron); }
.entry-pcf .f { color: var(--rose); }
.entry-pcf .sep { color: var(--ink-ghost); margin: 0 4px; }

.entry-actions {
  position: absolute;
  top: 14px;
  right: -8px;
  transform: translateX(100%);
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.entry:hover .entry-actions, .entry.expanded .entry-actions { opacity: 1; }
.entry-action {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink-soft);
  transition: all 0.18s ease;
  padding: 0;
}
.entry-action:hover {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}
.entry-action.delete:hover { color: var(--rose); border-color: var(--rose); }
.entry.expanded .entry-action.edit {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}

/* ───────── Inline edit panel ───────── */

.editor {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: minmax(180px, 0.6fr) 1fr;
  grid-template-areas: "meal meal" "grams search";
  gap: 22px 28px;
  margin-top: 14px;
  padding: 18px 20px 18px;
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-left: 2px solid var(--terracotta);
  border-radius: 2px;
  animation: fadeInUp 0.28s cubic-bezier(.22,.65,.27,1) both;
}
.editor-meal { grid-area: meal; }
.editor-grams { grid-area: grams; }
.editor-search { grid-area: search; }

.editor h4 {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-whisper);
  margin-bottom: 10px;
}

.meal-toggle {
  display: inline-flex;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
  overflow: hidden;
}
.meal-toggle button {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-soft);
  padding: 8px 14px;
  cursor: pointer;
  border-right: 1px solid var(--rule-soft);
  transition: all 0.18s ease;
}
.meal-toggle button:last-child { border-right: none; }
.meal-toggle button:hover { color: var(--terracotta); }
.meal-toggle button.active {
  background: var(--ink);
  color: var(--paper-warm);
}

input.ql-date {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 7px 10px;
  color: var(--ink);
  outline: none;
  max-width: 180px;
  color-scheme: light dark;
  transition: border-color 0.18s ease;
}
input.ql-date:focus { border-color: var(--terracotta); }
.editor-grams {
  display: flex;
  flex-direction: column;
}
.editor-grams .row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.editor-grams input {
  width: 90px;
  padding: 6px 10px;
  font-family: var(--serif);
  font-size: 19px;
  font-style: italic;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
  color: var(--ink);
  outline: none;
  transition: border-color 0.18s ease;
}
.editor-grams input:focus { border-color: var(--terracotta); }
.editor-grams .unit {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-soft);
  font-style: italic;
}
.editor-grams .save-grams,
.editor-search .save-search {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
  background: var(--ink);
  color: var(--paper-warm);
  border: none;
  border-radius: 2px;
  padding: 7px 14px;
  margin-left: auto;
  cursor: pointer;
  transition: background 0.18s ease;
}
.editor-grams .save-grams:hover,
.editor-search .save-search:hover { background: var(--terracotta); }
.editor-grams .save-grams[disabled] { background: var(--ink-ghost); cursor: not-allowed; }
.editor-grams .hint {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-whisper);
  margin-top: 8px;
}

.editor-search {
  display: flex;
  flex-direction: column;
}
.editor-search input {
  width: 100%;
  padding: 8px 12px;
  font-family: var(--serif);
  font-size: 15px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--card);
  color: var(--ink);
  outline: none;
  transition: border-color 0.18s ease;
}
.editor-search input::placeholder { color: var(--ink-ghost); font-style: italic; }
.editor-search input:focus { border-color: var(--terracotta); }
.editor-results {
  list-style: none;
  margin-top: 8px;
  max-height: 240px;
  overflow-y: auto;
  border-top: 1px solid var(--rule-soft);
}
.editor-results:empty { display: none; }
.editor-result {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: background 0.15s ease;
}
.editor-result:last-child { border-bottom: none; }
.editor-result:hover { background: var(--card-hover); margin-inline: -8px; padding-inline: 12px; }
.editor-result-name {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink);
  line-height: 1.3;
}
.editor-result-name .brand {
  color: var(--ink-soft);
  font-style: italic;
  margin-left: 4px;
}
.editor-result-meta {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-whisper);
  align-self: end;
  white-space: nowrap;
}
.editor-result-meta b {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  font-weight: 400;
  color: var(--terracotta);
  margin-right: 3px;
}
.editor-results .none {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
  padding: 10px 4px;
}

/* ──────────────────────────── States ──────────────────────────── */

.loading, .empty {
  text-align: center;
  padding: 80px 0;
  color: var(--ink-whisper);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.005em;
}
.loading::after {
  content: '…';
  display: inline-block;
  animation: dots 1.4s infinite;
}
.empty .ornament {
  display: block;
  font-size: 24px;
  color: var(--ink-ghost);
  margin-bottom: 10px;
  font-style: normal;
}

/* ──────────────────────────── Animations ──────────────────────────── */

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes dots {
  0%, 20% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}

/* ──────────────────────────── Mobile ──────────────────────────── */

@media (max-width: 640px) {
  body { padding: 22px 18px 60px; }
  .toolbar-btns { top: 22px; right: 18px; }
  .menu-btn { width: 34px; height: 34px; }
  .menu-pop { top: 42px; min-width: 200px; }
  .modal { margin: 0 auto; }
  .modal-head, .modal-tabs, .modal-body { padding-left: 18px; padding-right: 18px; }
  .form-row { grid-template-columns: 1fr; gap: 6px; }
  .form-row.macros { grid-template-columns: repeat(2, 1fr); }
  .form-row.macros label { grid-column: 1 / -1; margin-bottom: 4px; }
  .modal-backdrop { padding: 30px 14px; }
  .masthead { margin: 16px 0 40px; }
  .wordmark { font-size: 64px; }
  .dek { font-size: 15px; }

  .toolbar { gap: 16px; }
  .people, .people button { font-size: 17px; }

  .summary { padding: 24px 22px 22px; margin-bottom: 40px; }
  .summary::before { left: 22px; right: 22px; }
  .lede-num { font-size: 56px; }
  .metrics {
    grid-template-columns: repeat(2, 1fr);
    gap: 18px 16px;
  }
  .metric-value { font-size: 22px; }

  .day { margin-bottom: 44px; }
  .day-head { flex-direction: column; gap: 8px; align-items: flex-start; padding-bottom: 8px; }
  .day-head h2 { font-size: 26px; }
  .day-totals { gap: 12px; font-size: 11px; flex-wrap: wrap; }
  .day-totals span b { font-size: 14px; }

  .entry {
    grid-template-columns: 22px 1fr;
    grid-template-rows: auto auto;
    gap: 6px 14px;
    padding: 12px 0;
  }
  .entry .num { grid-row: 1 / 2; padding-top: 2px; font-size: 10px; }
  .entry-body { grid-column: 2 / 3; grid-row: 1 / 2; }
  .entry-macros {
    grid-column: 2 / 3; grid-row: 2 / 3;
    flex-direction: row;
    align-items: baseline;
    justify-content: flex-start;
    gap: 12px;
  }
  .entry-kcal { font-size: 18px; }
  .entry-name { font-size: 16px; }

  .entry-actions {
    position: static;
    transform: none;
    opacity: 1;
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    margin-left: auto;
  }

  .editor {
    grid-template-columns: 1fr;
    grid-template-areas: "meal" "grams" "search";
    gap: 22px;
    padding: 16px;
    margin-top: 12px;
  }
  .editor-grams .save-grams { margin-left: 12px; }
  .meal-toggle { width: 100%; }
  .meal-toggle button { flex: 1; padding: 8px 6px; font-size: 9.5px; letter-spacing: 0.1em; }
}
</style>
</head>
<body>
<div class="page">

  <div class="toolbar-btns">
    <button class="menu-btn" id="menu-btn" onclick="toggleMenu()" aria-label="Menu" aria-haspopup="true" aria-expanded="false" title="Menu">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M3 12h18"/>
        <path d="M3 18h18"/>
      </svg>
    </button>
    <div class="menu-pop" id="menu-pop" role="menu">
      <div class="menu-hint">Add</div>
      <button role="menuitem" onclick="closeMenu();openQuickLog()">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></span>
        Log a <em>meal</em>
      </button>
      <div class="sep"></div>
      <div class="menu-hint">Browse</div>
      <button role="menuitem" onclick="closeMenu();openLibrary()">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
        The <em>Library</em>
      </button>
      <div class="sep"></div>
      <button role="menuitem" onclick="closeMenu();location.reload()">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></span>
        Refresh
      </button>
    </div>
  </div>

  <div id="modal-root"></div>

  <header class="masthead">
    <div class="kicker">est. <span id="masthead-year">2026</span> · vol. i</div>
    <h1 class="wordmark">Cal<span class="accent">Track</span></h1>
    <p class="dek">Mindful eating, visualized.</p>
  </header>

  <nav class="toolbar" aria-label="Filters">
    <div class="people" role="tablist" aria-label="Person">
      <span class="label">Plate of</span>
      <button role="tab" id="btn-nevil" onclick="toggleUser('Nevil')">Nevil</button>
      <span class="sep">&amp;</span>
      <button role="tab" id="btn-malou" onclick="toggleUser('Malou')">Malou</button>
    </div>
    <div class="period" role="tablist" aria-label="Period">
      <button role="tab" id="btn-1" onclick="setDays(1)">Today</button>
      <button role="tab" id="btn-7" onclick="setDays(7)">7 Days</button>
      <button role="tab" id="btn-30" onclick="setDays(30)">30 Days</button>
    </div>
  </nav>

  <main id="content">
    <div class="loading">Setting the table</div>
  </main>
</div>

<script>
// `__API_URL__` is replaced at deploy time by .github/workflows/deploy.yml.
// In local dev / preview, the literal placeholder remains — fall back to the
// public production endpoint so the dashboard works without the build step.
// The split-string keeps sed from replacing this reference too.
const API_URL_PLACEHOLDER = '__' + 'API_URL__';
const INJECTED_API_URL = '__API_URL__';
const API_URL = INJECTED_API_URL === API_URL_PLACEHOLDER
  ? 'https://ymstbwfufjysoanzfnjm.supabase.co/functions/v1/dashboard-api'
  : INJECTED_API_URL;

let selectedUsers = new Set(['Nevil', 'Malou']);
let currentDays = 7;
let allLogs = [];

// Per-user daily macro goals. Edit these inline (or wire a settings UI later).
// Goals are shown as the row below the averages whenever exactly one person is
// selected — when both are filtered in, the household isn't comparable.
const MACRO_GOALS = {
  Nevil: {
    kcal:    { min: 2200, max: 2400 },
    protein: { min: 130,  max: 135  },
    carbs:   { min: 150,  max: 180  },
    fat:     { min: 80,   max: 90   },
  },
  // Malou: { kcal: {...}, protein: {...}, carbs: {...}, fat: {...} },
};

function activeGoals() {
  // Show goals when exactly one selected user has goals defined. If both
  // people are toggled in but only one has targets set, we still render
  // that one's goals (labelled with the user's name) instead of hiding.
  const withGoals = [...selectedUsers].filter((u) => MACRO_GOALS[u]);
  if (withGoals.length !== 1) return null;
  const u = withGoals[0];
  return { user: u, ...MACRO_GOALS[u] };
}

function rangeStatus(value, range) {
  if (!range) return null;
  if (value < range.min) return 'under';
  if (value > range.max) return 'over';
  return 'in';
}

function fmtRange(r, unit = '') {
  return `${r.min.toLocaleString('en-US')}–${r.max.toLocaleString('en-US')}${unit}`;
}

document.getElementById('masthead-year').textContent = new Date().getFullYear();

/* ───────── Top menu (popover) ───────── */
function toggleMenu() {
  const pop = document.getElementById('menu-pop');
  const btn = document.getElementById('menu-btn');
  const open = pop.getAttribute('data-open') === 'true';
  if (open) closeMenu();
  else {
    pop.setAttribute('data-open', 'true');
    btn.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
  }
}
function closeMenu() {
  const pop = document.getElementById('menu-pop');
  const btn = document.getElementById('menu-btn');
  if (!pop) return;
  pop.removeAttribute('data-open');
  btn.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
}
document.addEventListener('click', (e) => {
  const pop = document.getElementById('menu-pop');
  const btn = document.getElementById('menu-btn');
  if (!pop || pop.getAttribute('data-open') !== 'true') return;
  if (pop.contains(e.target) || btn.contains(e.target)) return;
  closeMenu();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMenu();
});

/* ───────── Auto theme by device clock ─────────
 * Light from 07:00 to 19:00 local; dark otherwise. Re-evaluated every minute
 * and on visibility change so a long-running tab flips at sundown without
 * needing a refresh. iOS status bar follows via the meta theme-color tag.
 */
function applyAutoTheme() {
  const h = new Date().getHours();
  const dark = h < 7 || h >= 19;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#161210' : '#F4EEDF');
}
applyAutoTheme();
setInterval(applyAutoTheme, 60_000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) applyAutoTheme(); });

function toggleUser(user) {
  if (selectedUsers.has(user)) {
    if (selectedUsers.size > 1) selectedUsers.delete(user);
    else { selectedUsers.clear(); selectedUsers.add(user); }
  } else {
    selectedUsers.add(user);
  }
  updateButtons();
  renderData(allLogs);
}

function setDays(days) {
  currentDays = days;
  updateButtons();
  fetchData();
}

function updateButtons() {
  document.getElementById('btn-nevil').classList.toggle('active', selectedUsers.has('Nevil'));
  document.getElementById('btn-malou').classList.toggle('active', selectedUsers.has('Malou'));
  document.getElementById('btn-1').classList.toggle('active', currentDays === 1);
  document.getElementById('btn-7').classList.toggle('active', currentDays === 7);
  document.getElementById('btn-30').classList.toggle('active', currentDays === 30);
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  try {
    const res = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
    if (res.ok) {
      allLogs = allLogs.filter((log) => log.id !== id);
      renderData(allLogs);
    } else { alert('Failed to delete entry'); }
  } catch (e) { alert('Error deleting entry'); }
}

async function resyncEntry(id) {
  try {
    const res = await fetch(`${API_URL}?action=resync&id=${id}`, { method: 'POST' });
    if (res.ok) fetchData();
    else alert('Resync failed');
  } catch (e) { alert('Resync error'); }
}

/* ───────── Edit panel ───────── */

let expandedId = null;
let searchAbort = null;
let searchTimer = null;

function toggleEditor(id) {
  expandedId = expandedId === id ? null : id;
  renderData(allLogs);
}

async function saveGrams(id) {
  const input = document.querySelector(`#entry-${id} .grams-input`);
  if (!input) return;
  const grams = Number(input.value);
  if (!Number.isFinite(grams) || grams <= 0) {
    input.style.borderColor = 'var(--rose)';
    return;
  }
  const btn = document.querySelector(`#entry-${id} .save-grams`);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const res = await fetch(`${API_URL}?action=update-grams&id=${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ grams }),
    });
    if (!res.ok) throw new Error(await res.text());
    expandedId = null;
    await fetchData();
  } catch (e) {
    alert('Save failed: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
  }
}

function onSearchInput(id) {
  const input = document.querySelector(`#entry-${id} .search-input`);
  const list = document.querySelector(`#entry-${id} .editor-results`);
  if (!input || !list) return;
  const q = input.value.trim();
  if (searchTimer) clearTimeout(searchTimer);
  if (searchAbort) searchAbort.abort();
  if (q.length < 2) { list.innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    searchAbort = new AbortController();
    try {
      const res = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`, {
        signal: searchAbort.signal,
      });
      const data = await res.json();
      renderSearchResults(id, data.results || []);
    } catch (e) {
      if (e.name !== 'AbortError') console.error('Search error', e);
    }
  }, 220);
}

function renderSearchResults(id, results) {
  const list = document.querySelector(`#entry-${id} .editor-results`);
  if (!list) return;
  if (!results.length) {
    list.innerHTML = '<li class="none">No matches.</li>';
    return;
  }
  list.innerHTML = results.map((r) => `
    <li class="editor-result" onclick="relink('${id}', ${r.fdc_id})">
      <span class="editor-result-name">
        ${escapeHtml(r.name)}${r.brand ? `<span class="brand">— ${escapeHtml(r.brand)}</span>` : ''}
      </span>
      <span class="editor-result-meta"><b>${r.kcal_per_100g}</b>kcal / 100g</span>
    </li>
  `).join('');
}

async function relink(id, fdcId) {
  try {
    const res = await fetch(`${API_URL}?action=relink&id=${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fdc_id: fdcId }),
    });
    if (!res.ok) throw new Error(await res.text());
    expandedId = null;
    await fetchData();
  } catch (e) {
    alert('Relink failed: ' + (e.message || e));
  }
}

/* ───────── Quick log (web-side, no voice) ───────── */

let quickLog = null; // { user, meal, items: [{...like recipe ingredients...}] }
let qlSearchTimer = null;
let qlSearchAbort = null;
let qlLastQuery = '';
let qlCfQuick = null;

function inferMealSlot() {
  const h = new Date().getUTCHours();
  if (h < 11) return 'breakfast';
  if (h < 14) return 'lunch';
  if (h < 17) return 'snack';
  return 'dinner';
}

function todayDateISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

async function openQuickLog() {
  // Pick a sensible default user — first selected one if any.
  const defaultUser = selectedUsers.has('Nevil') ? 'Nevil' : selectedUsers.has('Malou') ? 'Malou' : 'Nevil';
  quickLog = { user: defaultUser, meal: inferMealSlot(), date: todayDateISO(), items: [] };
  qlLastQuery = '';
  qlCfQuick = null;
  await loadLibrary();
  renderQuickLog();
}

function closeQuickLog() {
  quickLog = null;
  document.getElementById('modal-root').innerHTML = '';
}

function qlTotals() {
  const t = { kcal: 0, protein: 0, carbs: 0, fat: 0, grams: 0 };
  for (const i of quickLog.items) {
    const k = (Number(i.grams) || 0) / 100;
    t.grams += Number(i.grams) || 0;
    t.kcal += (Number(i.kcal_per_100g) || 0) * k;
    t.protein += (Number(i.protein_per_100g) || 0) * k;
    t.carbs += (Number(i.carbs_per_100g) || 0) * k;
    t.fat += (Number(i.fat_per_100g) || 0) * k;
  }
  return t;
}

function renderQuickLog() {
  const root = document.getElementById('modal-root');
  const t = qlTotals();
  const slotBtn = (k, label) =>
    `<button type="button" class="${quickLog.meal === k ? 'active' : ''}" onclick="setQlMeal('${k}')">${label}</button>`;
  const userBtn = (k) =>
    `<button type="button" class="${quickLog.user === k ? 'active' : ''}" onclick="setQlUser('${k}')">${k}</button>`;
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeQuickLog()">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h2>Log a <em>meal</em></h2>
          <button class="modal-close" onclick="closeQuickLog()">Close ✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <label>Plate of</label>
            <div class="meal-toggle">${userBtn('Nevil')}${userBtn('Malou')}</div>
          </div>
          <div class="form-row" style="margin-top:14px;">
            <label>Date</label>
            <input class="ql-date" type="date" value="${quickLog.date}" max="${todayDateISO()}" oninput="setQlDate(this.value)" />
          </div>
          <div class="form-row" style="margin-top:14px;">
            <label>Meal</label>
            <div class="meal-toggle">
              ${slotBtn('breakfast', 'Breakfast')}
              ${slotBtn('lunch', 'Lunch')}
              ${slotBtn('snack', 'Snack')}
              ${slotBtn('dinner', 'Dinner')}
            </div>
          </div>
          <div style="margin-top:22px;">
            <h4 style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-whisper);margin-bottom:10px;">Items</h4>
            <div class="ing-rows">
              ${quickLog.items.map((i, idx) => `
                <div class="ing-row" data-ql-idx="${idx}">
                  <span class="name"><span class="source">${i.source}</span>${escapeHtml(i.raw_name || '')}</span>
                  <span class="ing-macros">${ingMacrosHtml(i)}</span>
                  ${i.source === 'meal' ? `
                    <div class="servings-wrap">
                      <input class="servings" type="number" step="1" min="1" value="${i.servings || 1}" oninput="updateQlServings(${idx}, this.value)" />
                      <span class="label">${(i.servings || 1) === 1 ? 'serving' : 'servings'}</span>
                    </div>
                  ` : `
                    <input class="grams" type="number" step="0.1" min="0" value="${i.grams}" oninput="updateQlGrams(${idx}, this.value)" />
                  `}
                  <button type="button" class="ing-del" onclick="removeQlItem(${idx})" title="Remove">×</button>
                </div>
              `).join('')}
            </div>
            ${renderQlQuickChips()}
            <div class="ing-search">
              ${qlCfQuick ? renderQlCfQuick() : `
                <input type="search" placeholder="Search USDA, custom foods, or saved meals…" oninput="onQlSearch(this.value)" autocomplete="off" value="${escapeHtml(qlLastQuery)}" />
                <ul class="results" id="ql-search-results"></ul>
                <div id="ql-create-cf">${qlLastQuery ? `<button type="button" class="create-cf" onclick="openQlCfQuick('${escapeAttr(qlLastQuery)}')">＋ Create custom food: <b>${escapeHtml(qlLastQuery)}</b></button>` : ''}</div>
              `}
            </div>
            <div class="ing-totals">
              <span><b>${r0(t.kcal)}</b>kcal</span> &nbsp;·&nbsp;
              <span><b>${r0(t.protein)}</b>g protein</span> &nbsp;·&nbsp;
              <span><b>${r0(t.carbs)}</b>g carbs</span> &nbsp;·&nbsp;
              <span><b>${r0(t.fat)}</b>g fat</span> &nbsp;·&nbsp;
              <span><b>${r0(t.grams)}</b>g total</span>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="form-cancel" onclick="closeQuickLog()">Cancel</button>
            <button type="button" class="form-save" onclick="submitQuickLog()" ${quickLog.items.length === 0 ? 'disabled' : ''}>Log meal</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function setQlUser(u) { quickLog.user = u; renderQuickLog(); }
function setQlMeal(m) { quickLog.meal = m; renderQuickLog(); }
function setQlDate(d) { if (d) quickLog.date = d; }

async function onQlSearch(q) {
  if (qlSearchTimer) clearTimeout(qlSearchTimer);
  if (qlSearchAbort) qlSearchAbort.abort();
  q = q.trim();
  qlLastQuery = q;
  const list = document.getElementById('ql-search-results');
  if (!list) return;
  if (q.length < 2) { list.innerHTML = ''; return; }
  qlSearchTimer = setTimeout(async () => {
    qlSearchAbort = new AbortController();
    try {
      const ql = q.toLowerCase();
      // Saved meals first
      const recipeMatches = (libraryCache.recipes || [])
        .filter(r => r.name.toLowerCase().includes(ql)).slice(0, 4)
        .map(r => {
          const tg = Number(r.total_grams) || 1;
          const k = 100 / tg;
          return {
            source: 'meal',
            recipe_id: r.id,
            raw_name: r.name,
            kcal_per_100g: Number(r.total_kcal) * k,
            protein_per_100g: Number(r.total_protein) * k,
            carbs_per_100g: Number(r.total_carbs) * k,
            fat_per_100g: Number(r.total_fat) * k,
            fiber_per_100g: Number(r.total_fiber) * k,
            sugar_per_100g: Number(r.total_sugar) * k,
            sodium_per_100mg: Number(r.total_sodium) * k,
            sat_fat_per_100g: Number(r.total_sat_fat) * k,
            default_grams: tg,
          };
        });
      const customMatches = (libraryCache.custom_foods || [])
        .filter(f => f.name.toLowerCase().includes(ql)).slice(0, 4)
        .map(c => ({
          source: 'custom',
          custom_food_id: c.id,
          raw_name: c.name,
          kcal_per_100g: Number(c.kcal_per_100g),
          protein_per_100g: Number(c.protein_per_100g),
          carbs_per_100g: Number(c.carbs_per_100g),
          fat_per_100g: Number(c.fat_per_100g),
          fiber_per_100g: Number(c.fiber_per_100g),
          sugar_per_100g: Number(c.sugar_per_100g),
          sodium_per_100mg: Number(c.sodium_per_100mg),
          sat_fat_per_100g: Number(c.sat_fat_per_100g),
          default_grams: c.default_grams,
        }));
      // USDA via existing search endpoint
      const res = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`, { signal: qlSearchAbort.signal });
      const data = await res.json();
      const usdaResults = (data.results || []).slice(0, 6).map(u => ({
        source: 'usda',
        fdc_id: String(u.fdc_id),
        raw_name: u.brand ? `${u.name} (${u.brand})` : u.name,
        kcal_per_100g: u.kcal_per_100g,
        protein_per_100g: u.protein_per_100g,
        carbs_per_100g: u.carbs_per_100g,
        fat_per_100g: u.fat_per_100g,
        fiber_per_100g: 0, sugar_per_100g: 0, sodium_per_100mg: 0, sat_fat_per_100g: 0,
      }));
      const all = [...recipeMatches, ...customMatches, ...usdaResults];
      list.innerHTML = all.map((it) => `
        <li onclick='addQlItem(${JSON.stringify(it).replace(/'/g, "&#39;")})'>
          <span><span class="src">${it.source}</span> ${escapeHtml(it.raw_name)}</span>
          <span class="src">${r0(it.kcal_per_100g)} kcal/100g</span>
        </li>
      `).join('');
      const wrap = document.getElementById('ql-create-cf');
      if (wrap) {
        wrap.innerHTML = q
          ? `<button type="button" class="create-cf" onclick="openQlCfQuick('${escapeAttr(q)}')">＋ Create custom food: <b>${escapeHtml(q)}</b></button>`
          : '';
      }
    } catch (e) {
      if (e.name !== 'AbortError') console.error(e);
    }
  }, 220);
}

function addQlItem(it) {
  // Saved meals are quantified in servings (1 by default). One serving =
  // recipe.total_grams; the grams field stays the canonical scaler under the
  // hood so macro math doesn't have to special-case meals downstream.
  const isMeal = it.source === 'meal';
  const defaultGrams = it.default_grams ? Number(it.default_grams) : 100;
  quickLog.items.push({
    source: it.source,
    fdc_id: it.fdc_id || null,
    custom_food_id: it.custom_food_id || null,
    recipe_id: it.recipe_id || null,
    raw_name: it.raw_name,
    grams: defaultGrams,
    default_grams: defaultGrams,
    servings: isMeal ? 1 : undefined,
    kcal_per_100g: it.kcal_per_100g,
    protein_per_100g: it.protein_per_100g,
    carbs_per_100g: it.carbs_per_100g,
    fat_per_100g: it.fat_per_100g,
    fiber_per_100g: it.fiber_per_100g || 0,
    sugar_per_100g: it.sugar_per_100g || 0,
    sodium_per_100mg: it.sodium_per_100mg || 0,
    sat_fat_per_100g: it.sat_fat_per_100g || 0,
  });
  qlLastQuery = '';
  renderQuickLog();
}

/** Quick-add chip click — drop a saved meal in as 1 serving. */
function addQlMealById(recipeId) {
  const r = (libraryCache?.recipes || []).find((x) => x.id === recipeId);
  if (!r) return;
  // Don't double-add the same meal already in items
  if (quickLog.items.some((i) => i.recipe_id === recipeId)) return;
  const tg = Number(r.total_grams) || 1;
  const k = 100 / tg;
  addQlItem({
    source: 'meal',
    recipe_id: r.id,
    raw_name: r.name,
    kcal_per_100g: Number(r.total_kcal) * k,
    protein_per_100g: Number(r.total_protein) * k,
    carbs_per_100g: Number(r.total_carbs) * k,
    fat_per_100g: Number(r.total_fat) * k,
    fiber_per_100g: Number(r.total_fiber) * k,
    sugar_per_100g: Number(r.total_sugar) * k,
    sodium_per_100mg: Number(r.total_sodium) * k,
    sat_fat_per_100g: Number(r.total_sat_fat) * k,
    default_grams: tg,
  });
}

function renderQlQuickChips() {
  const recipes = (libraryCache?.recipes || [])
    .filter((r) => (r.use_count || 0) > 0)
    .sort((a, b) => (b.use_count || 0) - (a.use_count || 0))
    .slice(0, 6);
  if (!recipes.length) return '';
  const used = new Set(quickLog.items.map((i) => i.recipe_id).filter(Boolean));
  return `
    <div class="ql-chips">
      <span class="label">Quick add — your most-logged meals</span>
      ${recipes.map((r) => `
        <button type="button" class="ql-chip" ${used.has(r.id) ? 'disabled' : ''} onclick="addQlMealById('${r.id}')" title="${escapeAttr(r.name)} — used ${r.use_count}×">
          ${escapeHtml(r.name)}
          <span class="uses">${r.use_count}×</span>
        </button>
      `).join('')}
    </div>
  `;
}

function removeQlItem(idx) {

function refreshQlRowAndTotals(idx) {
  const rowMacros = document.querySelector(`.ing-row[data-ql-idx="${idx}"] .ing-macros`);
  if (rowMacros) rowMacros.innerHTML = ingMacrosHtml(quickLog.items[idx]);
  const t = qlTotals();
  const totalsEl = document.querySelector('.modal .ing-totals');
  if (totalsEl) {
    totalsEl.innerHTML = `
      <span><b>${r0(t.kcal)}</b>kcal</span> &nbsp;·&nbsp;
      <span><b>${r0(t.protein)}</b>g protein</span> &nbsp;·&nbsp;
      <span><b>${r0(t.carbs)}</b>g carbs</span> &nbsp;·&nbsp;
      <span><b>${r0(t.fat)}</b>g fat</span> &nbsp;·&nbsp;
      <span><b>${r0(t.grams)}</b>g total</span>
    `;
  }
}

function updateQlGrams(idx, value) {
  const n = Number(value);
  if (Number.isFinite(n) && n >= 0) quickLog.items[idx].grams = n;
  refreshQlRowAndTotals(idx);
}

function updateQlServings(idx, value) {
  const n = Math.max(1, Math.round(Number(value) || 1));
  const item = quickLog.items[idx];
  if (!item) return;
  item.servings = n;
  item.grams = n * (Number(item.default_grams) || 1);
  // Update servings/serving label without rerender (preserves focus).
  const wrap = document.querySelector(`.ing-row[data-ql-idx="${idx}"] .servings-wrap .label`);
  if (wrap) wrap.textContent = n === 1 ? 'serving' : 'servings';
  refreshQlRowAndTotals(idx);
}

async function saveQlCfQuick() {

  const macros = {
    kcal_per_100g: Number(qlCfQuick.kcal_per_100g) || 0,

    fat_per_100g: Number(qlCfQuick.fat_per_100g) || 0,
    fiber_per_100g: 0, sugar_per_100g: 0, sodium_per_100mg: 0, sat_fat_per_100g: 0,
  };
  const grams = Number(qlCfQuick.grams) || 100;
  const res = await fetch(`${API_URL}?action=create-custom-food`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, ...macros, default_grams: grams }),
  });
  if (!res.ok) { alert('Save failed: ' + (await res.text())); return; }
  const created = await res.json();
  await loadLibrary(true);
  quickLog.items.push({
    source: 'custom', fdc_id: null, custom_food_id: created.id, recipe_id: null,
    raw_name: created.name, grams, ...macros,
  });
  qlCfQuick = null;
  qlLastQuery = '';
  renderQuickLog();
}

function dayOffsetFromToday(yyyymmdd) {
  if (!yyyymmdd) return 0;
  const [y, m, d] = yyyymmdd.split('-').map(Number);
  // Compare local-noon for both dates so DST shifts don't bleed the diff.
  const sel = new Date(y, m - 1, d, 12, 0, 0);
  const today = new Date();
  today.setHours(12, 0, 0, 0);
  return Math.round((sel - today) / 86_400_000);
}

async function submitQuickLog() {
  if (!quickLog || !quickLog.items.length) return;
  const body = {
    user: quickLog.user,
    meal: quickLog.meal,
    date_offset_days: dayOffsetFromToday(quickLog.date),
    items: quickLog.items.map((i) => ({
      name: i.raw_name,
      raw_name: i.raw_name,
      fdc_id: i.fdc_id,
      custom_food_id: i.custom_food_id,
      recipe_id: i.recipe_id,
      grams: i.grams,
      kcal_per_100g: i.kcal_per_100g,
      protein_per_100g: i.protein_per_100g,
      carbs_per_100g: i.carbs_per_100g,
      fat_per_100g: i.fat_per_100g,
      fiber_per_100g: i.fiber_per_100g,
      sugar_per_100g: i.sugar_per_100g,
      sodium_per_100mg: i.sodium_per_100mg,
      sat_fat_per_100g: i.sat_fat_per_100g,
    })),
  };
  const res = await fetch(`${API_URL}?action=log-items`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) { alert('Log failed: ' + (await res.text())); return; }
  closeQuickLog();
  await fetchData();
}

let libraryCache = null;   // { custom_foods: [], recipes: [] }
let modalState = null;     // { tab, view, editing? } or null when closed

async function loadLibrary(force = false) {
  if (libraryCache && !force) return libraryCache;
  const res = await fetch(`${API_URL}?action=library`);
  if (!res.ok) throw new Error('Library load failed');
  libraryCache = await res.json();
  return libraryCache;
}

async function openLibrary() {
  modalState = { tab: 'meals', view: 'list' };
  await renderModal();
}

function closeModal() {
  modalState = null;
  document.getElementById('modal-root').innerHTML = '';
}

async function renderModal() {
  if (!modalState) { closeModal(); return; }
  const lib = await loadLibrary();
  const root = document.getElementById('modal-root');
  let body = '';
  if (modalState.view === 'list') body = renderLibraryList(lib);
  else if (modalState.view === 'edit-food') body = renderCustomFoodForm(modalState.editing);
  else if (modalState.view === 'edit-recipe') body = renderRecipeForm(modalState.editing);

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal" role="dialog" aria-modal="true">

          <h2>The <em>Library</em></h2>
          <button class="modal-close" onclick="closeModal()">Close ✕</button>

        ${modalState.view === 'list' ? `
          <div class="modal-tabs">
            <button class="${modalState.tab === 'meals' ? 'active' : ''}" onclick="setLibTab('meals')">Meals</button>
            <button class="${modalState.tab === 'foods' ? 'active' : ''}" onclick="setLibTab('foods')">Custom foods</button>
          </div>
        ` : ''}
        <div class="modal-body">${body}</div>
      </div>
    </div>
  `;
}

function setLibTab(tab) {
  modalState.tab = tab;
  renderModal();
}

  if (modalState.tab === 'foods') {
    const foods = lib.custom_foods || [];
    return `
      <button class="add-btn" onclick="newCustomFood()">＋ New custom food</button>

          <span class="meta"><b>${r0(r.total_kcal)}</b>kcal · ${r0(r.total_protein)}p · ${r0(r.total_carbs)}c · ${r0(r.total_fat)}f · ${r0(r.total_grams)}g</span>
          <span class="acts">
            <button onclick="editRecipe('${r.id}')" title="Edit" aria-label="Edit">${pencilSvg()}</button>

async function saveCustomFood(event, id) {
  event.preventDefault();
  const fd = new FormData(event.target);
  const body = Object.fromEntries(fd.entries());
  // numbers
  for (const k of ['kcal_per_100g','protein_per_100g','carbs_per_100g','fat_per_100g','fiber_per_100g','sugar_per_100g','sodium_per_100mg','sat_fat_per_100g','default_grams']) {
    if (body[k] === '' || body[k] === undefined) body[k] = null;
    else body[k] = Number(body[k]);
  }
  const url = id
    ? `${API_URL}?action=update-custom-food&id=${id}`
    : `${API_URL}?action=create-custom-food`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) { alert('Save failed: ' + (await res.text())); return; }
  await loadLibrary(true);
  modalState.tab = 'foods';
  setLibView('list');
}

async function deleteCustomFood(id) {
  if (!confirm('Delete this custom food?')) return;
  const res = await fetch(`${API_URL}?action=delete-custom-food&id=${id}`, { method: 'DELETE' });
  if (!res.ok) { alert('Delete failed'); return; }
  await loadLibrary(true);
  renderModal();
}

        <button type="button" class="save" onclick="saveCfQuick()">Save &amp; add</button>
      </div>
    </div>
  `;
}

function ingMacrosHtml(i) {
  const k = (Number(i.grams) || 0) / 100;
  const kcal = Math.round((Number(i.kcal_per_100g) || 0) * k);
  const p = Math.round((Number(i.protein_per_100g) || 0) * k);
  const c = Math.round((Number(i.carbs_per_100g) || 0) * k);
  const f = Math.round((Number(i.fat_per_100g) || 0) * k);
  return `<b>${kcal}</b>kcal<span class="sep">·</span><span class="p">${p}p</span><span class="sep">·</span><span class="c">${c}c</span><span class="sep">·</span><span class="f">${f}f</span>`;
}

function recipeTotals() {
  const t = { grams: 0, kcal: 0, protein: 0, carbs: 0, fat: 0 };
  for (const i of recipeDraft.ingredients) {
    const k = (Number(i.grams) || 0) / 100;
    t.grams += Number(i.grams) || 0;
    t.kcal += (Number(i.kcal_per_100g) || 0) * k;
    t.protein += (Number(i.protein_per_100g) || 0) * k;
    t.carbs += (Number(i.carbs_per_100g) || 0) * k;
    t.fat += (Number(i.fat_per_100g) || 0) * k;
  }
  return t;
}

        <div class="ing-rows">

let ingSearchTimer = null;
let ingSearchAbort = null;
let ingLastQuery = '';
let ingCfQuick = null; // { name, kcal, protein, carbs, fat, grams } — inline custom-food creator state

async function onIngredientSearch(q) {
  if (ingSearchTimer) clearTimeout(ingSearchTimer);
  if (ingSearchAbort) ingSearchAbort.abort();
  q = q.trim();
  ingLastQuery = q;
  const list = document.getElementById('ing-search-results');
  if (!list) return;
  if (q.length < 2) { list.innerHTML = ''; return; }
  ingSearchTimer = setTimeout(async () => {
    ingSearchAbort = new AbortController();
    try {
      // Custom foods: client-side filter
      const customMatches = (libraryCache.custom_foods || [])
        .filter(f => f.name.toLowerCase().includes(q.toLowerCase()))
        .slice(0, 4);
      // USDA: server search
      const res = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`, { signal: ingSearchAbort.signal });
      const data = await res.json();
      const usdaResults = data.results || [];
      const all = [
        ...customMatches.map(c => ({
          source: 'custom',
          custom_food_id: c.id,
          raw_name: c.name,
          kcal_per_100g: Number(c.kcal_per_100g),
          protein_per_100g: Number(c.protein_per_100g),
          carbs_per_100g: Number(c.carbs_per_100g),
          fat_per_100g: Number(c.fat_per_100g),
          fiber_per_100g: Number(c.fiber_per_100g),
          sugar_per_100g: Number(c.sugar_per_100g),
          sodium_per_100mg: Number(c.sodium_per_100mg),
          sat_fat_per_100g: Number(c.sat_fat_per_100g),
          default_grams: c.default_grams,
        })),
        ...usdaResults.slice(0, 6).map(u => ({
          source: 'usda',
          fdc_id: String(u.fdc_id),
          raw_name: u.brand ? `${u.name} (${u.brand})` : u.name,
          kcal_per_100g: u.kcal_per_100g,
          protein_per_100g: u.protein_per_100g,
          carbs_per_100g: u.carbs_per_100g,
          fat_per_100g: u.fat_per_100g,
          fiber_per_100g: 0, sugar_per_100g: 0, sodium_per_100mg: 0, sat_fat_per_100g: 0,
        })),
      ];
      const items = all.map((it) => `
        <li onclick='addIngredient(${JSON.stringify(it).replace(/'/g, "&#39;")})'>
          <span><span class="src">${it.source}</span> ${escapeHtml(it.raw_name)}</span>
          <span class="src">${r0(it.kcal_per_100g)} kcal/100g</span>
        </li>
      `).join('');
      list.innerHTML = items;
    } catch (e) {
      if (e.name !== 'AbortError') console.error(e);
    }
    // Always show the "create custom food" affordance below the results
    // when the query is non-empty — the user might want to add it as a
    // brand-new item even if some existing entries kind of match.
    const wrap = document.getElementById('ing-create-cf');
    if (wrap) {
      wrap.innerHTML = q
        ? `<button type="button" class="create-cf" onclick="openCfQuick('${escapeAttr(q)}')">＋ Create custom food: <b>${escapeHtml(q)}</b></button>`
        : '';
    }
  }, 220);
}

function escapeAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function openCfQuick(prefilledName) {
  ingCfQuick = {
    name: prefilledName || '',

    protein_per_100g: '',
    carbs_per_100g: '',
    fat_per_100g: '',

}

function closeCfQuick() {

}

function setCfQuickField(field, value) {

}

async function saveCfQuick() {
  if (!ingCfQuick) return;
  const name = (ingCfQuick.name || '').trim();
  if (!name) { alert('Name required'); return; }
  const macros = {
    kcal_per_100g: Number(ingCfQuick.kcal_per_100g) || 0,
    protein_per_100g: Number(ingCfQuick.protein_per_100g) || 0,
    carbs_per_100g: Number(ingCfQuick.carbs_per_100g) || 0,
    fat_per_100g: Number(ingCfQuick.fat_per_100g) || 0,
    fiber_per_100g: 0, sugar_per_100g: 0, sodium_per_100mg: 0, sat_fat_per_100g: 0,
  };
  const grams = Number(ingCfQuick.grams) || 100;
  const res = await fetch(`${API_URL}?action=create-custom-food`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, ...macros, default_grams: grams }),
  });
  if (!res.ok) { alert('Save failed: ' + (await res.text())); return; }
  const created = await res.json();
  await loadLibrary(true);
  // Add it as an ingredient to the recipe immediately.
  recipeDraft.ingredients.push({
    source: 'custom',
    fdc_id: null,
    custom_food_id: created.id,
    raw_name: created.name,
    grams,
    ...macros,
  });
  ingCfQuick = null;
  renderModal();
}

  recipeDraft.ingredients.push({
    source: it.source,
    fdc_id: it.fdc_id || null,
    custom_food_id: it.custom_food_id || null,
    raw_name: it.raw_name,
    grams: it.default_grams ? Number(it.default_grams) : 100,
    kcal_per_100g: it.kcal_per_100g,
    protein_per_100g: it.protein_per_100g,
    carbs_per_100g: it.carbs_per_100g,

    sugar_per_100g: it.sugar_per_100g || 0,

function removeIngredient(idx) {

function updateIngredientGrams(idx, value) {
  const n = Number(value);
  if (Number.isFinite(n) && n >= 0) recipeDraft.ingredients[idx].grams = n;

      <span><b>${r0(t.fat)}</b>g fat</span> &nbsp;·&nbsp;

async function saveRecipe(event, id) {
  event.preventDefault();
  const body = {
    name: recipeDraft.name.trim(),
    notes: recipeDraft.notes,
    ingredients: recipeDraft.ingredients,
  };
  if (!body.name || body.ingredients.length === 0) return;
  const url = id ? `${API_URL}?action=update-recipe&id=${id}` : `${API_URL}?action=create-recipe`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
