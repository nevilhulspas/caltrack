/* ───────── helpers ───────── */

const r0 = (n) => Math.round(Number(n) || 0);
const r1 = (n) => Math.round((Number(n) || 0) * 10) / 10;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function formatDayHead(dateStr) {
  const d = new Date(dateStr);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();

  const weekday = d.toLocaleDateString('en-GB', { weekday: 'long' });
  const month = d.toLocaleDateString('en-GB', { month: 'long' });
  const day = ordinal(d.getDate());

  let prefix = '';
  if (sameDay(d, today)) prefix = 'Today, ';
  else if (sameDay(d, yesterday)) prefix = 'Yesterday, ';
  return `${prefix}<em>${weekday}</em>, ${month} ${day}`;
}

function dayKey(dateStr) {
  return new Date(dateStr).toISOString().slice(0, 10);
}

function mealOf(dateStr) {
  // The Edge Function stores canonical meal times in UTC (8 / 12:30 / 15 / 19).
  // Bucket by UTC hours so meal labels stay correct regardless of the
  // viewer's local timezone.
  const h = new Date(dateStr).getUTCHours();
  if (h < 11) return { key: 'breakfast', label: 'Breakfast', order: 0 };
  if (h < 14) return { key: 'lunch', label: 'Lunch', order: 1 };
  if (h < 17) return { key: 'snack', label: 'Snack', order: 2 };
  return { key: 'dinner', label: 'Dinner', order: 3 };
}

function periodLabel() {
  if (currentDays === 1) return 'Today';
  return `Last ${currentDays} days`;
}

function periodMeta() {
  if (currentDays === 1) return new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  const start = new Date(); start.setDate(start.getDate() - currentDays + 1);
  const end = new Date();
  const fmt = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return `${fmt(start)} — ${fmt(end)}`;
}

/* ───────── render ───────── */

function renderData(logs) {
  const content = document.getElementById('content');

  if (selectedUsers.size === 0) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>Select a person to view their meals.</div>';
    return;
  }

  const filtered = logs.filter((l) => selectedUsers.has(l.user_name));
  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>No meals logged yet.</div>';
    return;
  }

  /* group: day → user → meal → entries  */
  const days = new Map(); // dayKey → { dateStr, byUser: Map<user, Map<mealKey, {meal, entries}>> }
  for (const log of filtered) {
    const k = dayKey(log.entry_date);
    if (!days.has(k)) days.set(k, { dateStr: log.entry_date, byUser: new Map() });
    const day = days.get(k);
    const u = log.user_name || 'Unknown';
    if (!day.byUser.has(u)) day.byUser.set(u, new Map());
    const userMeals = day.byUser.get(u);
    const meal = mealOf(log.entry_date);
    if (!userMeals.has(meal.key)) userMeals.set(meal.key, { meal, entries: [] });
    userMeals.get(meal.key).entries.push(log);
  }

  /* summary across the whole filtered range */
  let totalKcal = 0, totalP = 0, totalC = 0, totalF = 0;
  let matched = 0, tracked = 0;
  for (const log of filtered) {
    totalKcal += Number(log.calories) || 0;
    totalP += Number(log.protein_g) || 0;
    totalC += Number(log.carbs_g) || 0;
    totalF += Number(log.fat_g) || 0;
    if (log.usda_status) {
      tracked++;
      if (log.usda_status === 'matched') matched++;
    }
  }
  const dayCount = days.size;
  const avgKcal = dayCount ? Math.round(totalKcal / dayCount) : 0;
  const avgP = dayCount ? Math.round(totalP / dayCount) : 0;
  const avgC = dayCount ? Math.round(totalC / dayCount) : 0;
  const avgF = dayCount ? Math.round(totalF / dayCount) : 0;
  const matchPct = tracked ? Math.round((matched / tracked) * 100) : null;

  let html = renderSummary({
    avgKcal, avgP, avgC, avgF,
    totalKcal: r0(totalKcal), totalP: r0(totalP), totalC: r0(totalC), totalF: r0(totalF),
    dayCount, entries: filtered.length,
  });

  /* day spreads, newest first */
  const sortedDays = [...days.values()].sort((a, b) => new Date(b.dateStr) - new Date(a.dateStr));
  for (const day of sortedDays) {
    html += renderDay(day);
  }

  content.innerHTML = html;
}

function renderSummary(s) {
  const single = currentDays === 1;
  const ledeNum = single ? s.totalKcal : s.avgKcal;
  const ledeUnit = single ? '<b>kcal</b> today' : '<b>kcal</b> per day, on average';
  const proteinValue = single ? s.totalP : s.avgP;
  const carbsValue = single ? s.totalC : s.avgC;
  const fatValue = single ? s.totalF : s.avgF;
  const proteinSub = single ? 'today' : `${s.totalP}g total`;
  const carbsSub = single ? 'today' : `${s.totalC}g total`;
  const fatSub = single ? 'today' : `${s.totalF}g total`;

  const goals = activeGoals();
  // Only compare the average to the goal range with a status dot when the
  // selected data is for the goal owner alone — otherwise the average is a
  // household number and the comparison would mislead.
  const goalsCompare = goals && selectedUsers.size === 1 && selectedUsers.has(goals.user);
  const goalLine = (val, range, unit) => {
    if (!range) return '';
    const st = goalsCompare ? rangeStatus(val, range) : '';
    const dot = goalsCompare ? `<span class="dot ${st}"></span>` : '';
    return `<div class="metric-goal">${dot}goal&nbsp;<b>${fmtRange(range, unit)}</b></div>`;
  };
  const goalLabel = goals && selectedUsers.size > 1
    ? `Daily goal · ${escapeHtml(goals.user)}`
    : 'Daily goal';
  const ledeGoalHtml = goals
    ? `<div class="lede-goal"><span>${goalLabel}</span><b>${fmtRange(goals.kcal)} kcal</b></div>`
    : '';

  return `
    <section class="summary">
      <div class="summary-kicker">
        <span>${escapeHtml(periodLabel())}</span>
        <span class="meta">${escapeHtml(periodMeta())}</span>
      </div>
      <div class="lede">
        <span class="lede-num">${ledeNum.toLocaleString('en-US')}</span>
        <span class="lede-unit">${ledeUnit}</span>
      </div>
      ${ledeGoalHtml}
      <div class="metrics">
        <div class="metric protein">
          <span class="metric-label">Protein${single ? '' : ' / day'}</span>
          <span class="metric-value">${proteinValue}<span class="unit">g</span></span>
          <span class="metric-sub">${proteinSub}</span>
          ${goalLine(proteinValue, goals?.protein, 'g')}
        </div>
        <div class="metric carbs">
          <span class="metric-label">Carbs${single ? '' : ' / day'}</span>
          <span class="metric-value">${carbsValue}<span class="unit">g</span></span>
          <span class="metric-sub">${carbsSub}</span>
          ${goalLine(carbsValue, goals?.carbs, 'g')}
        </div>
        <div class="metric fat">
          <span class="metric-label">Fat${single ? '' : ' / day'}</span>
          <span class="metric-value">${fatValue}<span class="unit">g</span></span>
          <span class="metric-sub">${fatSub}</span>
          ${goalLine(fatValue, goals?.fat, 'g')}
        </div>
        <div class="metric">
          <span class="metric-label">Entries</span>
          <span class="metric-value">${s.entries}</span>
          <span class="metric-sub">${s.dayCount} ${s.dayCount === 1 ? 'day' : 'days'}</span>
        </div>
      </div>
    </section>
  `;
}

function renderDay(day) {
  const userBlocks = [];
  // sort users alphabetically for stable order
  const users = [...day.byUser.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  for (const [userName, userMeals] of users) {
    let dayKcal = 0, dayP = 0, dayC = 0, dayF = 0;
    const meals = [...userMeals.values()].sort((a, b) => a.meal.order - b.meal.order);
    let mealsHtml = '';
    let entryIdx = 0;
    for (const { meal, entries } of meals) {
      // Group entries by submission first (raw_input + minute bucket of
      // created_at) so the transcript appears once per spoken entry and all
      // its items stay together. Sorting by entry_date alone interleaves
      // submissions because parse-food stores the same canonical meal hour
      // for every item.
      const subMap = new Map();
      for (const e of entries) {
        const minuteBucket = e.created_at ? e.created_at.slice(0, 16) : '';
        const key = `${e.raw_input || ''}::${minuteBucket}`;
        if (!subMap.has(key)) {
          subMap.set(key, { key, raw_input: e.raw_input || '', entries: [], firstCreated: e.created_at });
        }
        subMap.get(key).entries.push(e);
      }
      // Submissions ordered by when they were actually logged.
      const submissions = [...subMap.values()].sort(
        (a, b) => new Date(a.firstCreated) - new Date(b.firstCreated),
      );
      for (const sub of submissions) {
        sub.entries.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }

      let mealKcal = 0;
      let submissionsHtml = '';
      for (const sub of submissions) {
        let entriesHtml = '';
        for (const e of sub.entries) {
          entryIdx++;
          const kcal = r0(e.calories);
          const p = r0(e.protein_g);
          const c = r0(e.carbs_g);
          const f = r0(e.fat_g);
          dayKcal += kcal; dayP += p; dayC += c; dayF += f;
          mealKcal += kcal;
          entriesHtml += renderEntry(e, entryIdx, kcal, p, c, f);
        }
        // Skip the transcript line if it's identical to the only entry's
        // food_name (no value in showing the same string twice).
        const showTranscript =
          sub.raw_input &&
          !(sub.entries.length === 1 && sub.raw_input.trim() === (sub.entries[0].food_name || '').trim());
        const transcriptHtml = showTranscript
          ? `<div class="transcript">${escapeHtml(sub.raw_input)}</div>`
          : '';
        submissionsHtml += `
          <div class="transcript-list">
            ${transcriptHtml}
            <ul class="entries">${entriesHtml}</ul>
          </div>
        `;
      }

      mealsHtml += `
        <div class="meal">
          <div class="meal-head">
            <h3>${escapeHtml(meal.label)}</h3>
            <span class="ornament"></span>
            <span class="meal-stat">${mealKcal.toLocaleString('en-US')} kcal</span>
          </div>
          ${submissionsHtml}
        </div>
      `;
    }
    userBlocks.push(`
      <article class="day">
        <header class="day-head">
          <h2>${formatDayHead(day.dateStr)}${users.length > 1 ? ` <em>· ${escapeHtml(userName)}</em>` : ''}</h2>
          <div class="day-totals">
            <span><b>${dayKcal.toLocaleString('en-US')}</b>kcal</span>
            <span class="sep">·</span>
            <span><b>${dayP}</b>g protein</span>
            <span class="sep">·</span>
            <span><b>${dayC}</b>g carbs</span>
            <span class="sep">·</span>
            <span><b>${dayF}</b>g fat</span>
          </div>
        </header>
        ${mealsHtml}
      </article>
    `);
  }
  return userBlocks.join('');
}

function renderEntry(e, idx, kcal, p, c, f) {
  const grams = e.usda_grams ? `<span class="grams">${r0(e.usda_grams)}g</span>` : '';
  const sourceBadge = e.usda_status === 'ai'
    ? `<span class="ai-badge" title="Macros estimated by Claude">AI</span>`
    : e.usda_status === 'estimated'
    ? `<span class="estimated" onclick="event.stopPropagation();resyncEntry('${e.id}')" title="Click to retry USDA match">estimated</span>`
    : '';
  const libBadge = e.recipe_id
    ? `<span class="lib-badge recipe" title="Saved meal">★ meal</span>`
    : e.custom_food_id
    ? `<span class="lib-badge custom" title="Custom food">★ custom</span>`
    : '';
  const notes = e.notes ? `<span class="notes">"${escapeHtml(e.notes)}"</span>` : '';
  const metaParts = [grams, libBadge, sourceBadge, notes].filter(Boolean).join('<span class="sep">·</span>');
  const isExpanded = expandedId === e.id;
  return `
    <li class="entry${isExpanded ? ' expanded' : ''}" id="entry-${e.id}">
      <span class="num">${String(idx).padStart(2, '0')}</span>
      <div class="entry-body">
        <span class="entry-name">${escapeHtml(e.food_name || e.raw_input)}</span>
        ${metaParts ? `<span class="entry-meta">${metaParts}</span>` : ''}
      </div>
      <div class="entry-macros">
        <span class="entry-kcal">${kcal.toLocaleString('en-US')}<span class="unit">kcal</span></span>
        <span class="entry-pcf">
          <span class="p">${p}p</span><span class="sep">·</span><span class="c">${c}c</span><span class="sep">·</span><span class="f">${f}f</span>
        </span>
      </div>
      <div class="entry-actions">
        <button class="entry-action edit" onclick="toggleEditor('${e.id}')" title="${isExpanded ? 'Close editor' : 'Edit'}" aria-label="Edit entry">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="entry-action delete" onclick="deleteEntry('${e.id}')" title="Delete" aria-label="Delete entry">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
      </div>
      ${isExpanded ? renderEditor(e) : ''}
    </li>
  `;
}

function renderEditor(e) {
  const currentGrams = e.usda_grams ? r0(e.usda_grams) : 100;
  const fdcId = e.usda_fdc_id || null;
  const isMatched = e.usda_status === 'matched';
  const meal = mealOf(e.entry_date).key;
  const mealBtn = (k, label) =>
    `<button class="${meal === k ? 'active' : ''}" onclick="updateMeal('${e.id}', '${k}')">${label}</button>`;
  return `
    <div class="editor" onclick="event.stopPropagation()">
      <div class="editor-meal">
        <h4>Meal</h4>
        <div class="meal-toggle">
          ${mealBtn('breakfast', 'Breakfast')}
          ${mealBtn('lunch', 'Lunch')}
          ${mealBtn('snack', 'Snack')}
          ${mealBtn('dinner', 'Dinner')}
        </div>
      </div>
      <div class="editor-grams">
        <h4>Quantity</h4>
        <div class="row">
          <input class="grams-input" type="number" min="1" step="1" value="${currentGrams}" />
          <span class="unit">g</span>
          <button class="save-grams" onclick="saveGrams('${e.id}')">Save</button>
        </div>
        <div class="hint">${
          isMatched
            ? `Macros recompute from USDA <em>${escapeHtml(e.food_name || '')}</em>${fdcId ? ` <span style="color:var(--ink-ghost)">(FDC ${escapeHtml(fdcId)})</span>` : ''}.`
            : e.usda_status === 'ai'
            ? `AI entry — macros rescale proportionally with the gram change.`
            : `Estimated entry — only the gram weight changes; macros stay as Claude's guess.`
        }</div>
      </div>
      <div class="editor-search">
        <h4>Replace with another USDA food</h4>
        <input class="search-input" type="search" placeholder="Search USDA FoodData Central…" oninput="onSearchInput('${e.id}')" autocomplete="off" />
        <ul class="editor-results"></ul>
        ${e.recipe_id ? `
          <div style="margin-top:14px; padding-top:12px; border-top:1px solid var(--rule-soft);">
            <button class="add-btn secondary" onclick="event.preventDefault();editMealFromEntry('${e.recipe_id}')" type="button">★ Edit meal</button>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

updateButtons();
fetchData();
</script>
</body>
</html>
