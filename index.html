<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#F0E9DA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CalTrack">
<title>CalTrack — Mindful eating, visualized</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* paper */
  --paper:        #F0E8D6;
  --paper-warm:   #F8F1DE;
  --paper-edge:   #E4DAC2;
  --card:         #FBF6E8;
  --card-hover:   #FFF9EB;

  /* ink */
  --ink:          #1A140C;
  --ink-soft:     #5C4F3A;
  --ink-whisper:  #9C8E72;
  --ink-ghost:    #C4B89C;

  /* hairline */
  --rule:         rgba(26, 20, 12, 0.10);
  --rule-soft:    rgba(26, 20, 12, 0.05);

  /* food palette */
  --terracotta:   #B14A2D;
  --terracotta-soft: rgba(177, 74, 45, 0.08);
  --sage:         #5C7547;
  --sage-soft:    rgba(92, 117, 71, 0.10);
  --saffron:      #C18935;
  --saffron-soft: rgba(193, 137, 53, 0.10);
  --rose:         #8C3F31;

  /* type */
  --serif:        'Newsreader', 'EB Garamond', Georgia, serif;
  --mono:         'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* rhythm */
  --gutter: 28px;
  --max-w:  720px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
}

body {
  font-family: var(--serif);
  font-feature-settings: "kern", "liga", "onum", "ss01";
  font-optical-sizing: auto;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px var(--gutter) 80px;
  padding-top: max(28px, env(safe-area-inset-top));
  padding-bottom: max(80px, env(safe-area-inset-bottom));
  position: relative;
  overflow-x: hidden;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* paper grain */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.08 0 0 0 0 0.05 0 0 0 0.6 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.35;
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 0;
}

/* warm light gradient at top */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; height: 320px;
  background: radial-gradient(ellipse 70% 100% at 50% 0%, rgba(255, 220, 160, 0.25), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.page {
  max-width: var(--max-w);
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ───────────────────────────── Masthead ───────────────────────────── */

.masthead {
  text-align: center;
  margin: 24px 0 56px;
  animation: fadeInUp 0.7s cubic-bezier(.22,.65,.27,1) both;
}

.kicker {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-whisper);
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.kicker::before, .kicker::after {
  content: '';
  width: 30px; height: 1px;
  background: var(--ink-ghost);
}

.wordmark {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: clamp(56px, 11vw, 92px);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 72;
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.wordmark .accent {
  color: var(--terracotta);
  font-style: italic;
}

.dek {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  color: var(--ink-soft);
  margin-top: 14px;
  letter-spacing: 0.005em;
}

.refresh-btn {
  position: absolute;
  top: 32px;
  right: var(--gutter);
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 38px; height: 38px;
  cursor: pointer;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  z-index: 2;
}
.refresh-btn:hover {
  background: var(--card);
  color: var(--terracotta);
  border-color: var(--terracotta);
}
.refresh-btn:active svg { animation: spin 0.6s ease; }

/* ──────────────────────────── Toolbar ──────────────────────────── */

.toolbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 44px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  animation: fadeInUp 0.7s 0.08s cubic-bezier(.22,.65,.27,1) both;
}

.people {
  font-family: var(--serif);
  font-size: 19px;
}
.people .label {
  font-style: italic;
  color: var(--ink-whisper);
  margin-right: 12px;
  font-size: 13px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: var(--mono);
  font-weight: 500;
}
.people button {
  background: none;
  border: none;
  font-family: var(--serif);
  font-size: 19px;
  color: var(--ink-ghost);
  cursor: pointer;
  padding: 4px 4px;
  margin-right: 6px;
  border-bottom: 1.5px dashed transparent;
  transition: all 0.2s ease;
  font-weight: 400;
}
.people button.active {
  color: var(--ink);
  font-style: italic;
  border-bottom-color: var(--terracotta);
}
.people button:hover:not(.active) {
  color: var(--ink-soft);
}
.people .sep {
  color: var(--ink-ghost);
  margin: 0 2px;
}

.period {
  display: inline-flex;
  gap: 0;
  align-items: baseline;
}
.period button {
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-whisper);
  cursor: pointer;
  padding: 6px 12px;
  transition: color 0.2s ease;
  border-bottom: 1.5px solid transparent;
}
.period button.active {
  color: var(--terracotta);
  border-bottom-color: var(--terracotta);
}
.period button:hover:not(.active) {
  color: var(--ink-soft);
}

/* ──────────────────────────── Summary ──────────────────────────── */

.summary {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 32px 36px 30px;
  margin-bottom: 56px;
  position: relative;
  box-shadow: 0 1px 0 var(--paper-edge), 0 30px 50px -30px rgba(60, 40, 10, 0.18);
  animation: fadeInUp 0.7s 0.16s cubic-bezier(.22,.65,.27,1) both;
}

.summary::before {
  content: '';
  position: absolute;
  top: -1px; left: 32px; right: 32px;
  height: 3px;
  background: var(--terracotta);
}

.summary-kicker {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--terracotta);
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
}
.summary-kicker .meta {
  color: var(--ink-whisper);
  font-weight: 400;
  letter-spacing: 0.15em;
}

.lede {
  display: flex;
  align-items: baseline;
  gap: 18px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 22px;
  margin-bottom: 22px;
}
.lede-num {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 76px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--ink);
  font-variation-settings: "opsz" 72;
}
.lede-unit {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink-soft);
  font-weight: 400;
}
.lede-unit b {
  font-style: normal;
  font-weight: 400;
  color: var(--ink);
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.metric {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.metric-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-whisper);
}
.metric-value {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-feature-settings: "onum" 0, "lnum" 1;
}
.metric-value .unit {
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  margin-left: 1px;
}
.metric-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-whisper);
}
.metric.protein .metric-value { color: var(--sage); }
.metric.carbs .metric-value { color: var(--saffron); }
.metric.match .metric-value { color: var(--terracotta); }

/* ──────────────────────────── Day spreads ──────────────────────────── */

.day {
  margin-bottom: 64px;
  animation: fadeInUp 0.7s cubic-bezier(.22,.65,.27,1) both;
}
.day:nth-of-type(odd) { animation-delay: 0.24s; }
.day:nth-of-type(even) { animation-delay: 0.30s; }

.day-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--ink);
}
.day-head h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 32px;
  letter-spacing: -0.015em;
  color: var(--ink);
  font-variation-settings: "opsz" 36;
}
.day-head h2 em {
  font-style: italic;
  color: var(--terracotta);
}

.day-totals {
  display: flex;
  gap: 22px;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.day-totals span b {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 16px;
  font-style: italic;
  color: var(--ink);
  margin-right: 3px;
}
.day-totals .sep {
  color: var(--ink-ghost);
  font-weight: 400;
}

.meal {
  margin-bottom: 32px;
}
.meal:last-child { margin-bottom: 0; }

.meal-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.meal-head h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--ink);
}
.meal-head .ornament {
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.meal-head .meal-stat {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
}

.entries { list-style: none; }

.entry {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: baseline;
  gap: 18px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  position: relative;
  cursor: default;
  transition: background 0.2s ease;
}
.entry:hover { background: var(--card-hover); margin-inline: -10px; padding-inline: 10px; }
.entry:last-child { border-bottom: none; }

.entry .num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-ghost);
  letter-spacing: 0.05em;
  align-self: start;
  padding-top: 4px;
}

.entry-body { min-width: 0; }
.entry-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.005em;
  line-height: 1.3;
  display: block;
}
.entry-meta {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-whisper);
  margin-top: 2px;
  display: block;
}
.entry-meta .estimated {
  color: var(--rose);
  cursor: pointer;
  border-bottom: 1px dotted var(--rose);
}
.entry-meta .estimated:hover { color: var(--terracotta); border-color: var(--terracotta); }
.entry-meta .grams::before { content: '· '; color: var(--ink-ghost); margin: 0 4px 0 6px; }
.entry-meta .notes { font-style: italic; }
.entry-meta .notes::before { content: '· '; color: var(--ink-ghost); margin: 0 4px 0 6px; }

.entry-macros {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
}
.entry-kcal {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  color: var(--terracotta);
  letter-spacing: -0.01em;
  line-height: 1;
}
.entry-kcal .unit {
  font-family: var(--mono);
  font-size: 10px;
  font-style: normal;
  color: var(--ink-whisper);
  margin-left: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}
.entry-pcf {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  font-weight: 400;
  white-space: nowrap;
}
.entry-pcf .p { color: var(--sage); }
.entry-pcf .c { color: var(--saffron); }
.entry-pcf .f { color: var(--rose); }
.entry-pcf .sep { color: var(--ink-ghost); margin: 0 4px; }

.entry-actions {
  position: absolute;
  top: 50%;
  right: -8px;
  transform: translate(100%, -50%);
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.entry:hover .entry-actions { opacity: 1; }
.entry-action {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink-soft);
  transition: all 0.18s ease;
  padding: 0;
}
.entry-action:hover {
  background: var(--card);
  color: var(--rose);
  border-color: var(--rose);
}

/* ──────────────────────────── States ──────────────────────────── */

.loading, .empty {
  text-align: center;
  padding: 80px 0;
  color: var(--ink-whisper);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.005em;
}
.loading::after {
  content: '…';
  display: inline-block;
  animation: dots 1.4s infinite;
}
.empty .ornament {
  display: block;
  font-size: 24px;
  color: var(--ink-ghost);
  margin-bottom: 10px;
  font-style: normal;
}

/* ──────────────────────────── Animations ──────────────────────────── */

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes dots {
  0%, 20% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}

/* ──────────────────────────── Mobile ──────────────────────────── */

@media (max-width: 640px) {
  body { padding: 22px 18px 60px; }
  .refresh-btn { top: 22px; right: 18px; width: 34px; height: 34px; }
  .masthead { margin: 16px 0 40px; }
  .wordmark { font-size: 64px; }
  .dek { font-size: 15px; }

  .toolbar { gap: 16px; }
  .people, .people button { font-size: 17px; }

  .summary { padding: 24px 22px 22px; margin-bottom: 40px; }
  .summary::before { left: 22px; right: 22px; }
  .lede-num { font-size: 56px; }
  .metrics {
    grid-template-columns: repeat(2, 1fr);
    gap: 18px 16px;
  }
  .metric-value { font-size: 22px; }

  .day { margin-bottom: 44px; }
  .day-head { flex-direction: column; gap: 8px; align-items: flex-start; padding-bottom: 8px; }
  .day-head h2 { font-size: 26px; }
  .day-totals { gap: 12px; font-size: 11px; flex-wrap: wrap; }
  .day-totals span b { font-size: 14px; }

  .entry {
    grid-template-columns: 22px 1fr;
    grid-template-rows: auto auto;
    gap: 6px 14px;
    padding: 12px 0;
  }
  .entry .num { grid-row: 1 / 2; padding-top: 2px; font-size: 10px; }
  .entry-body { grid-column: 2 / 3; grid-row: 1 / 2; }
  .entry-macros {
    grid-column: 2 / 3; grid-row: 2 / 3;
    flex-direction: row;
    align-items: baseline;
    justify-content: flex-start;
    gap: 12px;
  }
  .entry-kcal { font-size: 18px; }
  .entry-name { font-size: 16px; }

  .entry-actions {
    position: static;
    transform: none;
    opacity: 1;
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    margin-left: auto;
  }
}
</style>
</head>
<body>
<div class="page">

  <button class="refresh-btn" onclick="location.reload()" aria-label="Refresh" title="Refresh">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
    </svg>
  </button>

  <header class="masthead">
    <div class="kicker">est. <span id="masthead-year">2026</span> · vol. i</div>
    <h1 class="wordmark">Cal<span class="accent">Track</span></h1>
    <p class="dek">Mindful eating, visualized.</p>
  </header>

  <nav class="toolbar" aria-label="Filters">
    <div class="people" role="tablist" aria-label="Person">
      <span class="label">Plate of</span>
      <button role="tab" id="btn-nevil" onclick="toggleUser('Nevil')">Nevil</button>
      <span class="sep">&amp;</span>
      <button role="tab" id="btn-malou" onclick="toggleUser('Malou')">Malou</button>
    </div>
    <div class="period" role="tablist" aria-label="Period">
      <button role="tab" id="btn-1" onclick="setDays(1)">Today</button>
      <button role="tab" id="btn-7" onclick="setDays(7)">7 Days</button>
      <button role="tab" id="btn-30" onclick="setDays(30)">30 Days</button>
    </div>
  </nav>

  <main id="content">
    <div class="loading">Setting the table</div>
  </main>
</div>

<script>
const API_URL = '__API_URL__';

let selectedUsers = new Set(['Nevil', 'Malou']);
let currentDays = 7;
let allLogs = [];

document.getElementById('masthead-year').textContent = new Date().getFullYear();

function toggleUser(user) {
  if (selectedUsers.has(user)) {
    if (selectedUsers.size > 1) selectedUsers.delete(user);
    else { selectedUsers.clear(); selectedUsers.add(user); }
  } else {
    selectedUsers.add(user);
  }
  updateButtons();
  renderData(allLogs);
}

function setDays(days) {
  currentDays = days;
  updateButtons();
  fetchData();
}

function updateButtons() {
  document.getElementById('btn-nevil').classList.toggle('active', selectedUsers.has('Nevil'));
  document.getElementById('btn-malou').classList.toggle('active', selectedUsers.has('Malou'));
  document.getElementById('btn-1').classList.toggle('active', currentDays === 1);
  document.getElementById('btn-7').classList.toggle('active', currentDays === 7);
  document.getElementById('btn-30').classList.toggle('active', currentDays === 30);
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  try {
    const res = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
    if (res.ok) {
      allLogs = allLogs.filter((log) => log.id !== id);
      renderData(allLogs);
    } else { alert('Failed to delete entry'); }
  } catch (e) { alert('Error deleting entry'); }
}

async function resyncEntry(id) {
  try {
    const res = await fetch(`${API_URL}?action=resync&id=${id}`, { method: 'POST' });
    if (res.ok) fetchData();
    else alert('Resync failed');
  } catch (e) { alert('Resync error'); }
}

async function fetchData() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Setting the table</div>';
  try {
    const res = await fetch(`${API_URL}?days=${currentDays}`);
    const data = await res.json();
    allLogs = data.logs || [];
    renderData(allLogs);
  } catch (e) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>Unable to load data.</div>';
  }
}

/* ───────── helpers ───────── */

const r0 = (n) => Math.round(Number(n) || 0);
const r1 = (n) => Math.round((Number(n) || 0) * 10) / 10;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function formatDayHead(dateStr) {
  const d = new Date(dateStr);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();

  const weekday = d.toLocaleDateString('en-GB', { weekday: 'long' });
  const month = d.toLocaleDateString('en-GB', { month: 'long' });
  const day = ordinal(d.getDate());

  let prefix = '';
  if (sameDay(d, today)) prefix = 'Today, ';
  else if (sameDay(d, yesterday)) prefix = 'Yesterday, ';
  return `${prefix}<em>${weekday}</em>, ${month} ${day}`;
}

function dayKey(dateStr) {
  return new Date(dateStr).toISOString().slice(0, 10);
}

function mealOf(dateStr) {
  const h = new Date(dateStr).getHours();
  if (h < 11) return { key: 'breakfast', label: 'Breakfast', order: 0 };
  if (h < 14) return { key: 'lunch', label: 'Lunch', order: 1 };
  if (h < 17) return { key: 'snack', label: 'Snack', order: 2 };
  return { key: 'dinner', label: 'Dinner', order: 3 };
}

function periodLabel() {
  if (currentDays === 1) return 'Today';
  return `Last ${currentDays} days`;
}

function periodMeta() {
  if (currentDays === 1) return new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  const start = new Date(); start.setDate(start.getDate() - currentDays + 1);
  const end = new Date();
  const fmt = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return `${fmt(start)} — ${fmt(end)}`;
}

/* ───────── render ───────── */

function renderData(logs) {
  const content = document.getElementById('content');

  if (selectedUsers.size === 0) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>Select a person to view their meals.</div>';
    return;
  }

  const filtered = logs.filter((l) => selectedUsers.has(l.user_name));
  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><span class="ornament">✦</span>No meals logged yet.</div>';
    return;
  }

  /* group: day → user → meal → entries  */
  const days = new Map(); // dayKey → { dateStr, byUser: Map<user, Map<mealKey, {meal, entries}>> }
  for (const log of filtered) {
    const k = dayKey(log.entry_date);
    if (!days.has(k)) days.set(k, { dateStr: log.entry_date, byUser: new Map() });
    const day = days.get(k);
    const u = log.user_name || 'Unknown';
    if (!day.byUser.has(u)) day.byUser.set(u, new Map());
    const userMeals = day.byUser.get(u);
    const meal = mealOf(log.entry_date);
    if (!userMeals.has(meal.key)) userMeals.set(meal.key, { meal, entries: [] });
    userMeals.get(meal.key).entries.push(log);
  }

  /* summary across the whole filtered range */
  let totalKcal = 0, totalP = 0, totalC = 0, totalF = 0;
  let matched = 0, tracked = 0;
  for (const log of filtered) {
    totalKcal += Number(log.calories) || 0;
    totalP += Number(log.protein_g) || 0;
    totalC += Number(log.carbs_g) || 0;
    totalF += Number(log.fat_g) || 0;
    if (log.usda_status) {
      tracked++;
      if (log.usda_status === 'matched') matched++;
    }
  }
  const dayCount = days.size;
  const avgKcal = dayCount ? Math.round(totalKcal / dayCount) : 0;
  const avgP = dayCount ? Math.round(totalP / dayCount) : 0;
  const avgC = dayCount ? Math.round(totalC / dayCount) : 0;
  const avgF = dayCount ? Math.round(totalF / dayCount) : 0;
  const matchPct = tracked ? Math.round((matched / tracked) * 100) : null;

  let html = renderSummary({
    avgKcal, avgP, avgC, avgF,
    totalKcal: r0(totalKcal), totalP: r0(totalP), totalC: r0(totalC), totalF: r0(totalF),
    dayCount, entries: filtered.length, matchPct, matched, tracked,
  });

  /* day spreads, newest first */
  const sortedDays = [...days.values()].sort((a, b) => new Date(b.dateStr) - new Date(a.dateStr));
  for (const day of sortedDays) {
    html += renderDay(day);
  }

  content.innerHTML = html;
}

function renderSummary(s) {
  const single = currentDays === 1;
  const ledeNum = single ? s.totalKcal : s.avgKcal;
  const ledeUnit = single ? '<b>kcal</b> today' : '<b>kcal</b> per day, on average';
  const proteinValue = single ? s.totalP : s.avgP;
  const carbsValue = single ? s.totalC : s.avgC;
  const proteinSub = single ? 'today' : `${s.totalP}g total`;
  const carbsSub = single ? 'today' : `${s.totalC}g total`;
  return `
    <section class="summary">
      <div class="summary-kicker">
        <span>${escapeHtml(periodLabel())}</span>
        <span class="meta">${escapeHtml(periodMeta())}</span>
      </div>
      <div class="lede">
        <span class="lede-num">${ledeNum.toLocaleString('en-US')}</span>
        <span class="lede-unit">${ledeUnit}</span>
      </div>
      <div class="metrics">
        <div class="metric protein">
          <span class="metric-label">Protein${single ? '' : ' / day'}</span>
          <span class="metric-value">${proteinValue}<span class="unit">g</span></span>
          <span class="metric-sub">${proteinSub}</span>
        </div>
        <div class="metric carbs">
          <span class="metric-label">Carbs${single ? '' : ' / day'}</span>
          <span class="metric-value">${carbsValue}<span class="unit">g</span></span>
          <span class="metric-sub">${carbsSub}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Entries</span>
          <span class="metric-value">${s.entries}</span>
          <span class="metric-sub">${s.dayCount} ${s.dayCount === 1 ? 'day' : 'days'}</span>
        </div>
        <div class="metric match">
          <span class="metric-label">USDA match</span>
          <span class="metric-value">${s.matchPct === null ? '—' : s.matchPct + '<span class="unit">%</span>'}</span>
          <span class="metric-sub">${s.matchPct === null ? 'no data' : `${s.matched} of ${s.tracked}`}</span>
        </div>
      </div>
    </section>
  `;
}

function renderDay(day) {
  const userBlocks = [];
  // sort users alphabetically for stable order
  const users = [...day.byUser.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  for (const [userName, userMeals] of users) {
    let dayKcal = 0, dayP = 0, dayC = 0, dayF = 0;
    const meals = [...userMeals.values()].sort((a, b) => a.meal.order - b.meal.order);
    let mealsHtml = '';
    let entryIdx = 0;
    for (const { meal, entries } of meals) {
      // sort entries within a meal by time
      entries.sort((a, b) => new Date(a.entry_date) - new Date(b.entry_date));
      let mealKcal = 0;
      let entriesHtml = '';
      for (const e of entries) {
        entryIdx++;
        const kcal = r0(e.calories);
        const p = r0(e.protein_g);
        const c = r0(e.carbs_g);
        const f = r0(e.fat_g);
        dayKcal += kcal; dayP += p; dayC += c; dayF += f;
        mealKcal += kcal;
        entriesHtml += renderEntry(e, entryIdx, kcal, p, c, f);
      }
      mealsHtml += `
        <div class="meal">
          <div class="meal-head">
            <h3>${escapeHtml(meal.label)}</h3>
            <span class="ornament"></span>
            <span class="meal-stat">${mealKcal.toLocaleString('en-US')} kcal</span>
          </div>
          <ul class="entries">${entriesHtml}</ul>
        </div>
      `;
    }
    userBlocks.push(`
      <article class="day">
        <header class="day-head">
          <h2>${formatDayHead(day.dateStr)}${users.length > 1 ? ` <em>· ${escapeHtml(userName)}</em>` : ''}</h2>
          <div class="day-totals">
            <span><b>${dayKcal.toLocaleString('en-US')}</b>kcal</span>
            <span class="sep">·</span>
            <span><b>${dayP}</b>g protein</span>
            <span class="sep">·</span>
            <span><b>${dayC}</b>g carbs</span>
            <span class="sep">·</span>
            <span><b>${dayF}</b>g fat</span>
          </div>
        </header>
        ${mealsHtml}
      </article>
    `);
  }
  return userBlocks.join('');
}

function renderEntry(e, idx, kcal, p, c, f) {
  const grams = e.usda_grams ? `<span class="grams">${r0(e.usda_grams)}g</span>` : '';
  const estimated = e.usda_status && e.usda_status !== 'matched'
    ? `<span class="estimated" onclick="resyncEntry('${e.id}')" title="Click to retry USDA match">estimated</span>`
    : '';
  const notes = e.notes ? `<span class="notes">"${escapeHtml(e.notes)}"</span>` : '';
  const metaParts = [estimated, grams, notes].filter(Boolean).join('');
  return `
    <li class="entry" id="entry-${e.id}">
      <span class="num">${String(idx).padStart(2, '0')}</span>
      <div class="entry-body">
        <span class="entry-name">${escapeHtml(e.food_name || e.raw_input)}</span>
        ${metaParts ? `<span class="entry-meta">${metaParts}</span>` : ''}
      </div>
      <div class="entry-macros">
        <span class="entry-kcal">${kcal.toLocaleString('en-US')}<span class="unit">kcal</span></span>
        <span class="entry-pcf">
          <span class="p">${p}p</span><span class="sep">·</span><span class="c">${c}c</span><span class="sep">·</span><span class="f">${f}f</span>
        </span>
      </div>
      <div class="entry-actions">
        <button class="entry-action" onclick="deleteEntry('${e.id}')" title="Delete" aria-label="Delete entry">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
      </div>
    </li>
  `;
}

updateButtons();
fetchData();
</script>

</html>
